        (3) \qquad |y| = e^{\frac{x^2}{2}} + C \\
        (4) \qquad y(0) = 2 \Rightarrow 2 = e^0 + C \\
        (5) \qquad \boxed{y = e^{\frac{x^2}{2}} + 1} \\
      \end{gather*}
      \end{center}
    answer: Step 3
