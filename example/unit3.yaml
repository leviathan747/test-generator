    sections:
      - 3.1
      - 3.5
    dok: unknown

  - id: 10
    legacy_id: 3.A.10
    question: Given that $4x^2 - \sec y = x$, what is $\dydx$ in terms of $x$ and $y$?
    answer: $(8x - 1) \cos y \cot y$
    distractors:
      - $8x \cos y \cot y$
      - $(8x - 1) \cos y$
      - $(8x - 1) \sec y$
    solution: |
      $8x - \sec y \tan y \dydx = 1$ \\
      $8x - 1 = \sec y \tan y \dydx$ \\
      $\dydx = (8x - 1) \cdot \frac{1}{\sec y \tan y}$
      $= (8x - 1) \cos y \cot y$
    sections:
      - 3.1
      - 3.2
    dok: unknown

  - id: 11
    legacy_id: 3.A.12
    question: |
      Suppose that $g(x) = h(f(x))$, $f(3) = 6$, $h(3) = 2$, $h'(6) = 4$, $h'(3) = 15$, and $f'(3) = 8$.
      Find $g'(3)$.
    answer: 32
    distractors:
      - 120
      - 4
      - 60
    solution: |
      $g'(3) = h'(f(3)) \cdot f'(3) = h'(6) \cdot 8 = 4 \cdot 8 = 32$
      \quad (Chain Rule)
    sections:
      - 3.1
    dok: unknown

  - id: 12
    legacy_id: 3.A.13
    question: Find $(f^{-1})'(2)$ for the function $f(x) = x^3 + 2x - 1$.
    answer: $\frac{1}{5}$
    distractors:
      - 365
      - 14
      - $\frac{1}{2}$
    solution: |
      $(f^{-1})'(2) = \frac{1}{f'(f^{-1}(2))}$ \\
      $f'(x) = 3x^2 + 2$ \\
      $2 = x^3 + 2x - 1$ \quad (Solve for $x$ when $f(x) = 2$ to find $f^{-1}(2)$) \\
      $x = 1$ \\
      $(f^{-1})'(2) = \frac{1}{f'(1)}$
      $= \frac{1}{3(1)^2 + 2} = \frac{1}{5}$
    sections:
      - 3.3
    dok: unknown

  - id: 13
    legacy_id: 3.A.14
    question: Find an equation of the tangent line to the graph of $x^2 + 2y^2 = 3$ at the point $(1, -1)$.
    answer: $y + 1 = \frac{1}{2}(x - 1)$
    distractors:
      - $y + 1 = 2(x - 1)$
      - $y + 1 = -\frac{1}{2}(x - 1)$
      - $y + 1 = -2(x - 1)$
    solution: |
      $2x + 4y \dydx = 0$ \\
      $\dydx = -\frac{x}{2y}$ \\
      $\dydx \Big|_{(1, -1)} = -\frac{1}{2(-1)} = \frac{1}{2}$
    sections:
      - 3.1
      - 3.2
    dok: unknown

  - id: 14
    legacy_id: 3.A.15
    question: |
      If the slope of a strictly monotonic function $f$, is $\frac{1}{5}$ at a
      particular point $(b, a)$, what is the slope of $f^{-1}$ at the point $(a, b)$?
    answer: $5$
    distractors:
      - $\frac{1}{5}$
      - $-\frac{1}{5}$
      - $-5$
    solution: |
      The slope of $f^{-1}$ at the point $(a, b)$ is $(f^{-1})'(a)$ \\
      $(f^{-1})'(a) = \frac{1}{f'(f^{-1}(a))}$ \\
      $f^{-1}(a) = b$ \\
      $f'(b) = \frac{1}{5}$ \\
      $(f^{-1})'(a) = \frac{1}{\frac{1}{5}} = 5$
    sections:
      - 3.3
    dok: unknown

  - id: 15
    legacy_id: 3.A.16
    question: If $e^{xy} - y^2 = e - 4$, then at $x = \frac{1}{2}$ and $y = 2$, $\dydx =$
    answer: $\frac{4e}{8 - e}$
    distractors:
      - $\frac{e}{4}$
      - $\frac{e}{2}$
      - $\frac{4e}{4 - e}$
    solution: |
      $e^{xy} \cdot \left( x \dydx + y \right) - 2y \dydx = 0 - 0$ \\
      $\dydx \left(xe^{xy}  - 2y \right) + ye^{xy} = 0$ \\
      $\dydx = \frac{-ye^{xy}}{xe^{xy}  - 2y}$ \\
      $\dydx \Big|_{x = \frac{1}{2}, y = 2} = \frac{-(2)e^{\frac{1}{2} \cdot 2}}{\frac{1}{2}e^{\frac{1}{2} \cdot 2}  - 2(2)}$ \\
      $= \frac{-2e}{\frac{1}{2}e  - 4} \cdot \frac{-2}{-2}$ \\
      $= \frac{4e}{8 - e}$ \\
    sections:
      - 3.1
      - 3.2
    dok: unknown

  - id: 16
