  - id: 17
    legacy_id: 3.B.2
    question: |
      Let $f(x) = \sqrt{e^x + 2x + 3}$ and let $g$ be the inverse of $f$. Given
      $f(0) = 2$, what is the value of $g'(2)$?
    answer: $\frac{4}{3}$
    distractors:
      - $\frac{2 \sqrt{e^2 + 7}}{e^2 + 2}$
      - $\frac{3}{4}$
      - $\frac{3}{2}$
    solution: |
      \begin{gather*}
        g'(x) = (f^{-1})'(x) = \frac{1}{f'(f^{-1}(x))}
        \qquad f^{-1}(2) = 0 \\
        f'(x) = \frac{1}{2 \sqrt{e^x + 2x + 3}} \cdot (e^x + 2)
        = \frac{e^x + 2}{2 \sqrt{e^x + 2x + 3}} \\
        f'(0) = \frac{e^0 + 2}{2 \sqrt{e^0 + 2(0) + 3}}
        = \frac{3}{2 \sqrt{4}} = \frac{3}{4} \\
        g'(0) = \frac{1}{\frac{3}{4}} = \frac{4}{3} \\
      \end{gather*}
    sections: []
    dok: unknown

