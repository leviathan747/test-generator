  - id: 7
    legacy_id: 3.A.7
    question: Find $f'(x)$ if $f(x) = \cos^4(x^2)$.
    answer: $f'(x) = -8x\sin(x^2)\cos^3(x^2)$
    distractors:
      - $f'(x) = -4\sin^3(2x)$
      - $f'(x) = -8\sin^3(x^2)\cos(x^2)$
      - $f'(x) = 8\sin(x^2)\cos^3(x^2)$
    solution: |
      $f(x) = \left[ \cos(x^2) \right]^4$ \\
      $f'(x) = 4\left[ \cos(x^2) \right]^3 \cdot -\sin(x^2) \cdot 2x$
      $= -8x\sin(x^2)\cos^3(x^2)$ \quad (Chain Rule)
    sections:
      - 3.1
      - 3.5
    dok: unknown

  - id: 8
    legacy_id: 3.A.8
    question: |
      Let $f(x) = \sqrt[3]{\ln x + 3x^2 + 5}$ and let $g$ be the inverse function
      of $f$. Given $f(1) = 2$, what is the value of $g'(2)$?
    answer: $\frac{12}{7}$
    distractors:
      - $\frac{7}{12}$
      - $\ln 2$
      - $\frac{1}{2}$
    solution: |
      $g'(2) = (f^{-1})(2) = \frac{1}{f'(f^{-1}(2))}$ \\
      $f^{-1}(2) = 1$ \\
      $f'(x) = \frac{1}{3}\left( \ln x + 3x^2 + 5 \right)^{-\frac{2}{3}} \cdot \left( \frac{1}{x} + 6x \right)$ \\
      $f'(1) = \frac{1}{3}\left( \ln (1) + 3(1)^2 + 5 \right)^{-\frac{2}{3}} \cdot \left( \frac{1}{1} + 6(1) \right)$
      $= \frac{1}{3} \cdot \frac{1}{4} \cdot 7$
      $= \frac{7}{12}$ \\

      $g'(2) = \frac{1}{\frac{7}{12}} = \frac{12}{7}$
    sections:
      - 3.1
      - 3.3
      - 3.5
    dok: unknown

  - id: 9
