questions:
  - id: 1
    legacy_id: 3.A.1
    question: The table shows the values of the differentiable function $f$. If $H(x) = f^{-1}(x)$, find $H'(3)$.
    answer: $\frac{1}{4}$
    distractors:
      - 4
      - $\frac{1}{2}$
      - $\frac{1}{6}$
    solution: $H'(3) = (f^{-1})(3) = \frac{1}{f'(f^{-1}(3))} = \frac{1}{f'(2)} = \frac{1}{4}$
    sections:
      - 3.3
    dok: unknown

  - id: 2
    legacy_id: 3.A.2
    question: |
      \includegraphics{2}

      Given $h(x) = g(f(x))$, use the graph to the right to find $h'(4)$.
    answer: $\frac{5}{8}$
    distractors:
      - $\frac{1}{2}$
      - 0
      - $\frac{5}{4}$
    solution: |
      $h'(4) = g'(f(4)) \cdot f'(4)$ \\
      $f(4) = \frac{5}{2} \quad f'(4) = \frac{5}{4} \quad g'\left(\frac{5}{2}\right) = \frac{1}{2}$ \\
      $h'(4) = \frac{1}{2} \cdot \frac{5}{4} = \frac{5}{8}$ \\
      Note: the values of $f'$ and $g'$ are found by determining the slope of the graph at the given $x$ value.
    sections:
      - 3.1
    dok: unknown

  - id: 3
    legacy_id: 3.A.3
    question: Given $f(x) = \ln \left( \sin^{-1}(2x) \right)$, find $f'(x)$.
    answer: $\frac{2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
    distractors:
      - $\frac{-2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
      - $\frac{2}{(1 - x^2)\sin^{-1}(2x)}$
      - $\frac{1}{(1 - x^2)\sin^{-1}(2x)}$
    solution: |
      $f'(x) = \frac{1}{\sin^{-1}(2x)} \cdot \frac{1}{\sqrt{1 - (2x)^2}} \cdot 2$
      $= \frac{2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
      \qquad (Chain Rule)
    sections:
      - 3.1
      - 3.4
      - 3.5
    dok: unknown

