  - id: 4
    legacy_id: 6.A.4
    question: |
      Let $f(x)$ be a function whose first derivative is positive while the
      second derivative is negative on the closed interval $[a, b]$. The interval
      $[a, b]$ is partitioned into $n$ equal length sub-intervals and these are
      used to compute a left sum, right sum, and trapezoid rule approximations.
      Compare each to $\textstyle\int_{a}^{b} f(x) dx$ which represents the exact area
      under the curve.
    answer: left $<$ trapezoid $\textstyle < \int_{a}^{b} f(x) dx <$ right
    distractors:
      - left $\textstyle < \int_{a}^{b} f(x) dx <$ trapezoid $<$ right
      - right $<$ trapezoid $\textstyle < \int_{a}^{b} f(x) dx <$ left
      - right $\textstyle < \int_{a}^{b} f(x) dx <$ trapezoid $<$ left
    solution: TODO
    sections: []
    dok: unknown

