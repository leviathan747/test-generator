  - id: 12
    legacy_id: 3.A.13
    question: |
      An antique seller has a piece of memorabilia they are looking to sell. They
      have found that, over the last few months, the price of similar memorabilia
      has varied seemingly periodically on a website where memorabilia is sold.
      The table below provides values of the price, in dollars, of similar
      memorabilia on the website.

      \fullwidth{
        \begin{center}
          \begin{tabularx}{6in}{ |Y||*{5}{Y|} }
            \hline
            \textbf{Month} \bm{$t$} & 2 & 3 & 5 & 7 & 11 \\
            \hline
            \textbf{Price} \bm{$p$} & \$45 & \$53 & \$50 & \$30 & \$45 \\
            \hline
          \end{tabularx}
        \end{center}
      }

      The seller used technology to create a regression model $p(t) = a \sin (bt +
      c) + d$ using all five data points to model the price $p$ based on the
      month $t$. Based on the regression model, which of the following is the
      best estimate for the difference between the highest price and the lowest
      price that similar memorabilia has sold for?
    answer: \$31
    distractors:
      - \$15
      - \$40
      - \$55
    solution: TODO
    sections:
      - 3.7
    dok: unknown

