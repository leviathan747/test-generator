  - id: 5
    legacy_id: 3.A.5
    question: |
      Let $f$ be the function given by $f(\theta) = \cos \theta$. Which of the
      following describes the relationship between the inputs and outputs of $f$
      over one cycle of its graph?
    answer: As the inputs increase from 0 to $\pi$, the outputs will decrease, and as the inputs increase from $\pi$ to $2\pi$, the outputs will increase.
    distractors:
      - As the inputs increase from 0 to $\pi$, the outputs will increase, and as the inputs increase for $\pi$ to $2\pi$, the outputs will decrease.
