    question: |
      The complex number $z$ is graphed in the complex plane, as shown in the figure.

      \fullwidth{\begin{center}
        \includegraphics[width=3in]{1}
      \end{center}}

      The number $z$ can be represented according to its polar coordinates as
      $\textstyle \left(2 \cos \frac{2\pi}{3}\right) + i \left(2 \sin
      \frac{2\pi}{3}\right)$. Which of the following is a representation of $z$
      according to itse rectangular coordinates?
    answer: $-1 + \sqrt 3 i$
    distractors:
      - $-\frac{1}{2} + \frac{\sqrt 3}{2} i$
      - $-\sqrt 3 + i$
      - $-\frac{\sqrt 3}{2} + \frac{1}{2} i$
    solution: TODO
    sections:
      - 3.13
    dok: unknown

  - id: 2
    legacy_id: 3C.A.2
    question: |
      The graph of a polar function $r = g(\theta)$ contains the point $A$, where
      the polar coordinates of $A$ are given by $\textstyle \left(-4,
      -\frac{2\pi}{3}\right)$. In which quadrant does point $A$ lie?
    answer: Because the terminal ray of the angle with measure $\theta$ is in Quadrant III and $r < 0$, the point $A$ lies in Quadrant I.
    distractors:
      - Because the terminal ray of the angle with measure $\theta$ is in Quadrant II and $r < 0$, the point $A$ lies in Quadrant II.
      - Because the terminal ray of the angle with measure $\theta$ is in Quadrant II and $r < 0$, the point $A$ lies in Quadrant IV.
      - Because the terminal ray of the angle with measure $\theta$ is in Quadrant III and $r < 0$, the point $A$ lies in Quadrant III.
    solution: TODO
    sections:
      - 3.14
    dok: unknown

