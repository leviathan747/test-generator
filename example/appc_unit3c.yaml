  - id: 4
    legacy_id: 3C.A.4
    question: |
      Consider the polar function $r = g(\theta)$  graphed in the polar
      coordinate system where \\ $g(\theta) = \theta^2(\theta - 1)(\theta - 3)$. On
      the interval $-\infty < \theta < 0$ is the distance between the curve and
      the origin \emph{increasing} or \emph{decreasing}?
    answer: The distance between the curve and the origin is \emph{decreasing} because $f(\theta)$ is positive and decreasing on $-\infty < \theta < 0$.
    distractors:
      - The distance between the curve and the origin is \emph{increasing} because $f(\theta)$ is positive and decreasing on $-\infty < \theta < 0$.
      - The distance between the curve and the origin is \emph{increasing} because $f(\theta)$ is positive and increasing on $-\infty < \theta < 0$.
      - The distance between the curve and the origin is \emph{decreasing} because $f(\theta)$ is positive and increasing on $-\infty < \theta < 0$.
