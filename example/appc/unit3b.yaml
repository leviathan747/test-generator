    related_to:
      - 2afe8929-85d5-4c41-9d03-8555483f47f7
    question: |
      Consider the function $f$ defined by $f(x) = 3 \sin(x) - 2$. One of the
      zeros of $f$ in the interval $0 \le x < 2\pi$ is $\textstyle x =
      \sin^{-1}\left(\frac{2}{3}\right)$. Which of the following correctly
      describes the existence of other zeros on in this interval, along with
      correct reasoning?
    answer: There is one other zero at $\textstyle x = \pi - \sin^{-1}\left(\frac{2}{3}\right)$ because this is the only other angle in the interval for which $\textstyle \sin(x) = \frac{2}{3}$.
    distractors:
      - $\textstyle x = \sin^{-1}\left(\frac{2}{3}\right)$ is the only zero in this interval because the range of $g$ is $[-1, 1]$.
      - $\textstyle x = \sin^{-1}\left(\frac{2}{3}\right)$ is the only zero in this interval because $f$ completes only one period from $x = 0$ to $x = 2\pi$.
      - There is one other zero at $\textstyle x = 2\pi - \sin^{-1}\left(\frac{2}{3}\right)$ because this is the only other angle in the interval for which $\textstyle \sin(x) = \frac{2}{3}$.
    solution: TODO
    calculator_active: false
