      be a concrete wave that skateboarders can ride on. The architect is going
      to use a sinusoidal function to design the wave. The inputs of the function
      will be $x$, the distance along the ground, so that the $x$-axis will
      represent the ground, and the outputs will be $h$, the height above the
      ground. The wave will start, when $x = 0$, at its peak 3 feet off the
      ground. The wave will then reach the ground 8 feet away, when $x = 8$. The
      wave will continue up to its next peak, after which it will continue to
      decrease and increase periodically. Which of the following sinusoidal
      functions $h(x)$ will satisfy the architect’s design?
