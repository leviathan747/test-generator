      In an experiment, a research has measured the brightness of the moonlight once a week for the last 5 weeks.
      He observed that the brightness followed a periodic pattern.

      \fullwidth{
        \begin{center}
          \begin{tabularx}{6in}{ |Y||*{5}{Y|} }
            \hline
            \textbf{Week} \bm{$t$} & 1 & 2 & 3 & 4 & 5 \\
            \hline
            \textbf{Brightness (lumens)} \bm{$L$} & 6.0 & 10.6 & 11.9 & 9.1 & 4.1 \\
            \hline
          \end{tabularx}
        \end{center}
      }

      The researcher created a regression model $L(t) = a \sin(bt + c) + d$
      using the data in the table shown above. According to the regression
      model, how bright will the is the moon expected to be the next the
      researcher takes a measurement?
    answer: 0.4 lumens
    distractors:
      - 0.6 lumens
