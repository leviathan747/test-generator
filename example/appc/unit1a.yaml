  - id: 10
    legacy_id: 1A.A.11
    question: |
      The graph of $f$ is shown above with the six points $A$, $B$, $C$, $D$,
      $E$, and $F$ labeled. What are all the points where the graph of $f$ has a
      local maximum?
    answer: $A$, $C$, and $E$
