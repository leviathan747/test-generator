    dok: unknown

  - id: 15
    legacy_id: 1A.B.1
    question: |
      The polynomial $h$ is given by $h(x) = x^2(x^2 - 1)$. Which of the
      following describes the zeros of $h$?
    answer: $h$ has exactly three distinct real zeros.
    distractors:
      - $h$ has exactly four distinct real zeros.
      - $h$ has exactly one distinct real zero and two non-real zeros.
      - $h$ has exactly two distinct real zeros and one non-real zero.
    solution: |
      Real zeros at $x = 0$ with multiplicity 2. $(x^2 - 1)$ can be factored
      into $(x - 1)(x + 1)$. Giving two more distinct real zeros at $x = \pm1$.
    sections:
      - 1.5
    dok: unknown

