questions:
  - id: 1
    legacy_id: 1A.A.1
    question: |
      \begin{figureright}[3.5in]{\includegraphics[width=3in]{1}}

        The graph of a function $k$ is shown in the figure to the right. Which of
        the following best describes the behavior of the graph of $k$ from point
        $A$ to point $B$.
    answer: The graph of $k$ is increasing and concave down.
    distractors:
      - The graph of $k$ is increasing and concave up.
      - The graph of $k$ is decreasing and concave up.
      - The graph of $k$ is decreasing and concave down.
    solution: The rate of change is positive and it is decreasing.
    sections:
      - 1.1
    dok: unknown

  - id: 2
    legacy_id: 1A.A.2
    question: |
      The function $g$ is a polynomial with the following end behavior:
      \[ \lim_{x \to -\infty} g(x) = \infty \qquad \text{and} \qquad \lim_{x \to \infty} g(x) = -\infty \]
      Which of the following could be an expression for $g(x)$?
    answer: $-3x^5 + 4x^2 + 1$
    distractors:
      - $-x^4 + 2x^3 + 6$
      - $2x^3 - 7x^2 + 4x$
      - $4x^6 + x^3 - 5$
    solution: |
      An odd-degree polynomial with a negative leading coefficient has end
      behavior that matches the given description.
    sections:
      - 1.6
    dok: unknown

  - id: 3
    legacy_id: 1A.A.3
    question: |
      The figure to the right shows the graph of a function $h$. For how many
      values of $b$ does the function $h$ have an average rate of change of
      $\frac{1}{2}$ over the interval $[-2, b]$?
    answer: 2
    distractors:
      - 0
      - 1
      - 3
    solution: |
      A ray with slope $\frac{1}{2}$ starting at $(-2, 1)$ intersects with the
      graph of $h$ exactly 2 times. These points are the only two points for
      which the average rate of change of $h$ is equal to $\frac{1}{2}$.
    sections:
      - 1.2
    dok: unknown

  - id: 4
    legacy_id: 1A.A.4
    question: |
      \begin{center}
        \begin{tabularx}{6in}{ |*{6}{Y|} }
          \hline
          \bm{$x$}  & -2 & 0  & 2 & 4 & 6 \\
          \hline
          \bm{$f(x)$} & -5 & -4 & -1 & 4 & 11 \\
          \hline
        \end{tabularx}
      \end{center}

      \vspace{1em}

      The table above shows values for a function $f$ at selected values of $x$.
      Which of the following statements about $f$ best fits these data?
    answer: $f$ is best modeled by a quadratic function because the change in the average rates of change over consecutive equal-length input-value intervals is constant.
    distractors:
      - $f$ is best modeled by a linear function because the rate of change over consecutive equal-length input-value intervals is constant.
      - $f$ is best modeled by a linear function because the change in the average rates of change over consecutive equal-length input-value intervals is constant.
      - $f$ is best modeled by a quadratic function because the rate of change over consecutive equal-length input-value intervals is constant.
    solution: |
      \hspace{2in}
      \begin{tabularx}{4in}{ *{5}{Y} }
        $-4 - (-5) = \bm{1}$ & $-1 - (-4) = \bm{3}$ & $4 - (-1) = \bm{5}$ & $11 - 4 = \bm{7}$ \\
      \end{tabularx}

      \hspace{2.5in}
      \begin{tabularx}{3in}{ *{4}{Y} }
        $3 - 1 = \bm{2}$ & $5 - 3 = \bm{2}$ & $7 - 5 = \bm{2}$ \\
      \end{tabularx}
    sections:
      - 1.3
    dok: unknown

  - id: 5
    legacy_id: 1A.A.5
    question: |
      The polynomial function $p$ is given by $p(x) = -x(x + 2)(x - 3)^2$. Which
      of the following could be the graph of $p$?
    answer: \includegraphics[width=2.5in]{5A}
    distractors:
      - \includegraphics[width=2.5in]{5C}
      - \includegraphics[width=2.5in]{5B}
      - \includegraphics[width=2.5in]{5D}
    solution: |
      Downard facing fourth degree polynomial. Yeros at $x = -2$, $x = 0$, and
      $x = 3$ (multiplicity 2).
    sections:
      - 1.4
      - 1.5
      - 1.6
    dok: unknown

  - id: 6
    legacy_id: 1A.A.6
    question: |
      The polynomial $h$ is given by $h(x) = x^2(x^2 + 1)$. Which of the
      following describes the zeros of $h$?
    answer: $h$ has exactly one distinct real zero and two non-real zeros.
    distractors:
      - $h$ has exactly three distinct real zeros.
      - $h$ has exactly four distinct real zeros.
      - $h$ has exactly two distinct real zeros and one non-real zero.
    solution: |
      Real zero at $x = 0$ with multiplicity 2. $(x^2 + 1)$ cannot be factored
      over the reals, so it represents the remaining two complex zeros.
    sections:
      - 1.5
    dok: unknown

  - id: 7
    legacy_id: 1A.A.7
    question: |
      The figure to the right shows the graph of a function $h$. For how many
      values of $c$ does the function $h$ have an average rate of change of
      1 over the interval $[0, c]$?
    answer: 1
    distractors:
      - 0
      - 2
      - 3
    solution: |
      A ray with slope 1 starting at $(0, 1)$ intersects with the
      graph of $h$ exactly one time. This points is the only point for
      which the average rate of change of $h$ is equal to 1.
    sections:
      - 1.2
    dok: unknown

  - id: 8
    legacy_id: 1A.A.8
    question: |
      Let $g$ be a polynomial function whose graph has a point of inflection at $x = 3$.
      Which of the following statements about $g$ must be true?
    answer: The graph of the rate of change of $g$ has a relative extremum at $x = 3$.
    distractors:
      - The graph of $g$ has a relative extremum at $x = 3$.
      - The graph of $g$ is tangent to the $x$-axis at $x = 3$.
      - The graph of the rate of change of $g$ crosses the $x$-axis at $x = 3$.
    solution: |
      If the graph of the rate of change has a relative extremum, the rate of
      change must be switching from increasing to decreasing or decreasing to
      increasing, which means the graph of the function iteself has an
      inflection point at that $x$ value.
    sections:
      - 1.4
    dok: unknown

