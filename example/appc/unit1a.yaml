      - The ball begins at its maximum distance of 56.1 feet from the goal line when it is kicked and continually decreases in distance until it enters the goal 1.54 seconds after it was kicked.
    solution: |
      \begin{multicols}{2}
        Graph the function. Use the \emph{maximum} and \emph{zero} tools to
        find the maximum distance of the ball and time at which the ball's
        distance reaches zero (goes in the goal). Alternatively, use the
        \emph{trace} feature to find the approximate values and eliminate
        incorrect choices.

        \includegraphics[width=2.5in]{13S-B}
      \end{multicols}
    sections:
      - 1.1
    dok: unknown
