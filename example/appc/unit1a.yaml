        the zero of the function in the given interval. Since the rate of
        people entering the zoo goes from positive to negative at this point,
        the graph of the total number of people must switch from increasing to
        decreasing (and therefore the number of people reaches a relative
        maximum).

        \includegraphics[width=2.5in]{14S-B}
