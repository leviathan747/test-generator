  - id: 11
    legacy_id: 1A.A.12
    question: |
      The function $f$ is given by $f(x) = 1.07x^3 - 11.17x^2 + 23.71x + 2.13$.
      Which of the following values is an absolute extremum for the graph of $f$
      on the closed interval $-1 \le x \le 8$?
    answer: 24.770
    distractors:
      - -27.495
      - 5.653
      - 16.427
    solution: |
      \begin{multicols}{2}
        Graph the function. Observe that the absolute extrema occur at the end
        points. Use the \emph{trace} feature of your grphing caclulator to
        evaluate the function at both endpoints.

        \includegraphics[width=2.5in]{11S}
      \end{multicols}
    sections:
      - 1.4
    dok: unknown

  - id: 12
    legacy_id: 1A.A.13
    question: |
      Let $k$ be a polynomial function whose rate of change can be modeled by the
      function $R$, given by $R(x) = -3.261x^3 + 5.362x - 1.584$. Based on this
      model, how many points of inflection does the graph of $k$ have?
    answer: 2
    distractors:
      - 1
      - 3
      - 4
    solution: |
      \begin{multicols}{2}
        Graph the function. Observe that the function has two relative extrema.
        Since $R(x)$ is the \emph{rate of change} of the polynomial function
        $k$, the inflection points will occur at the same $x$ values as the
        relative extrema of $R$ (where $R$ switches from increasing to
        degreasing or vice versa). Therefore, $k$ will have two inflection
        points.

        \includegraphics[width=2.5in]{12S}
      \end{multicols}
    sections:
      - 1.4
    dok: unknown

  - id: 13
    legacy_id: 1A.A.14
    question: |
      A ball is thrown through an open window to the ground below. the height of
      the ball, in meters, at time $t$ seconds after it is thrown can be modeled by
      the function $h$, given by $h(t) = -4.9t^2 + 4.4t + 15.24$. which of the
      following describes the height of the ball above the ground?
    answer: After leaving the window, the height of the ball increases to its maximum height of 16.228 meters. then the height of the ball decreases until it reaches the ground 2.269 seconds after reaching its maximum height.
    distractors:
      - The ball begins at its maximum height of 15.240 meters. the height of the ball decreases until it reaches the ground 1.820 seconds after it leaves the window.
      - The ball begins at its maximum height of 15.240 meters. the height of the ball decreases until it reaches the ground 2.269 seconds after it leaves the window.
      - After leaving the window, the height of the ball increases to its maximum height of 16.228 meters. then the height of the ball decreases until it reaches the ground 1.820 seconds after reaching its maximum height.
    solution: |
      \begin{multicols}{2}
        graph the function. use the \emph{maximum} and \emph{zero} tools to
        find the maximum height of the ball and time at which the ball's height
        reaches zero (hits the ground). alternatively, use the \emph{trace}
        feature to find the approximate values and eliminate incorrect
        choices.

        \includegraphics[width=2.5in]{13s}
      \end{multicols}
    sections:
      - 1.1
    dok: unknown

