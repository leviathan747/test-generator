questions:
  - id: c5167c12-19ee-43fb-852f-830173b709d2
    legacy_ids:
      - 2B.A.1
    question: |
      A cybersecurity firm sells encryption packages that have security ratings
      that exist on a logarithmic scale of base 2. How many more times secure is
      a package with a rating of 7 than a package with a rating of 4?
    answer: 8
    distractors:
      - 3
      - 4
      - 6
    solution: |
      Each additional unit on the logarithmic scale corresponds to a factor of
      2 $\implies 2^{7 - 4} = 2^3 = 8$ times more secure
    calculator_active: false
    sections:
      - 2.9
    dok: unknown

  - id: f4242d60-24ba-48a6-9ff3-cccbb2be48ee
