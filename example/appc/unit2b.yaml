      (f \circ g)(x)$. Which of the following is true concerning $h$?
    answer: $h(x) = (g \circ f)(x)$ for all $x > 0$
    distractors:
      - $h$ is a constant function
      - $h$ is a linear function with a slope of 10
      - $h$ is an exponential function with a base of 10
    solution: |
      $h(x) = (f \circ g)(x) = (g \circ f)(x)$ for all $x$ in the domains of
      both $f$ and $g$ by the definition of the logarithmic function as the
      inverse of the exponential function.
    calculator_active: false
    sections:
      - '2.10'
    dok: unknown

  - id: d86f2b89-6714-45d3-98cc-98274aa96508
    legacy_ids:
      - 2B.B.6
    question: |
      The logarithmic function $L$ given by $L(x) = \log_{10}(x)$ can be
      expressed as a vertical dilation of the natural log function: $L(x) = A
      \cdot \ln(x)$. What is the value of the constant $A$?
    answer: $A = \frac{1}{\ln(10)}$
    distractors:
      - $A = \ln(10)$
      - $A = \frac{\ln(10)}{\log_{10}(e)}$
      - $A = \frac{\log_{10}(e)}{\ln(10)}$
    solution: |
      Use the change of base formula to switch from base 10 to base $e$.
      \begin{gather*}
        L(x) = \log_{10}(x)
        = \frac{\ln(x)}{\ln(10)}
        = \frac{1}{\ln(10)} \cdot \ln(x) \implies
        A = \frac{1}{\ln(10)}
      \end{gather*}
    calculator_active: false
    sections:
      - 2.12
    dok: unknown

