      - $(8, 2)$
      - $(4, 1)$
      - $(16, -2)$
    solution: |
      The point $(-1, 4)$ is shown on the graph of $f$. If the $x$ and $y$
      coordinates are swapped, the point $(4, -1)$ will appear on the graph of
      $f^{-1}$.
    calculator_active: false
