  - id: cc61125b-a2f5-4fa0-9088-e9639aac6699
    legacy_ids:
      - 2B.A.5
    question: |
      Let $f(x) = \log_{10}(ax)$ and $g(x) = \log_{10}(bx^2)$ for positive
      numbers $a$ and $b$. Let $k(x) = f(x) + g(x)$. Which of the following
      expresses $k$ as a single logarithmic expression?
    answer: $k(x) = \log_{10}(abx^3)$
    distractors:
      - $k(x) = \log_{10}(ax + bx^2)$
      - $k(x) = 3\log_{10}(abx)$
      - $k(x) = \log_{10}((a + b)x^2)$
    solution: |
      \begin{gather*}
        k(x) = f(x) + g(x)
        = \log_{10}(ax) + \log_{10}(bx^2)
        = \log_{10}(ax \cdot bx^2)
        = \log_{10}(abx^3)
      \end{gather*}
    calculator_active: false
    sections:
      - 2.12
    dok: unknown

  - id: b210ae64-4ef8-4949-b38a-b046a47121f4
    legacy_ids:
      - 2B.A.6
    question: |
      The logarithmic function $L$ can be expressed as $L(x) = A \log_3(x)$ and
      also as $L(x) = B \log_2(x)$. Which of the following is an expression for
      $A$ in terms of $B$?
    answer: $A = \frac{B}{\log_3(2)}$
    distractors:
      - $A = B \log_3(2)$
      - $A = B \cdot \frac{\log_3(2)}{\log_2(3)}$
      - $A = B \cdot \frac{\log_2(3)}{\log_3(2)}$
    solution: |
      Use the change of base formula to switch from base 2 to base 3.
      \begin{gather*}
        L(x) = B \log_2(x)
        = B \left( \frac{\log_3(x)}{\log_3(2)} \right)
        = B \left( \frac{\log_3(x)}{\log_3(2)} \right)
        = \frac{B}{\log_3(2)} \cdot \log_3(x)
      \end{gather*}
      therefore $A = \frac{B}{\log_3(2)}$
    calculator_active: false
    sections:
      - 2.12
    dok: unknown

  - id: d8402242-f333-4360-b4ad-a333a1a3c1c6
    legacy_ids:
      - 2B.A.7
    question: |
      The functions $f$ and $g$ are given by $f(x) = \log_3(x - 2)$ and $g(x) =
      \log_3(2x - 1)$. Find all $x$ for which $f(x) + g(x) > 2$?
    answer: $x > \frac{7}{2}$ only
    distractors:
      - $x < -1$ only \phantom{$\frac{7}{2}$}
      - $x < -1$ or $x > \frac{7}{2}$
      - $-1 < x < \frac{7}{2}$
    solution: |
      Domain: $x > 2$
      \begin{gather*}
        \log_3(x - 2) + \log_3(2x - 1) > 2 \implies
        \log_3 \left( (x - 2)(2x - 1) \right) > 2 \implies
        (x - 2)(2x - 1) > 3^2 \implies \\
        2x^2 - 5x + 2 > 9 \implies
        2x^2 - 5x - 7 > 0 \implies
        (x + 1)(2x - 7) > 0 \implies
      \end{gather*}
      \sgchart{-1,\frac{7}{2}}{(x + 1)(2x - 7): +-+}
    calculator_active: false
    sections:
      - 2.13
    dok: unknown

  - id: 0b42d085-7882-4161-ae48-e4286f3d5668
    legacy_ids:
      - 2B.A.8
    question: |
      A student is solving the equation $5^x = 10^{3x - 1}$. They do not have
      their calculator, so they have to rely on a table of logarithms which
      provides values of $\log_{10}(x)$ for various $x$. Solving which of the
      following equations would enable the student to solve the original
      equation?
    answer: $x \log_{10} 5 = 3x - 1$
    distractors:
      - $\frac{1}{2} x = 3x - 1$
      - $x \log_{10} \frac{1}{5} = 3x - 1$
      - $x + \log_{10} 5 = 3x - 1$
    solution: |
      \begin{gather*}
        5^x = 10^{3x - 1} \implies
        \log_{10} 5^x = 3x - 1 \implies
        x \log_{10} 5 = 3x - 1
      \end{gather*}
    calculator_active: false
    sections:
      - 2.13
    dok: unknown

  - id: 2876b156-b54f-4d9c-a6f1-edbaebce5bcf
