    dok: unknown

  - id: 2697b893-6eb5-4dab-b7d5-fdc9249934f8
    legacy_ids:
      - 2B.A.11
    question: |
      Which of the following is an expression for the inverse of $f(x) = 3^{2x} +
      1$, along with its domain?
    answer: $f^{-1}(x) = \frac{1}{2} \log_3(x - 1)$ for $x > 1$
    distractors:
      - $f^{-1}(x) = \frac{1}{2} \log_3(x - 1)$ for $x > 0$
      - $f^{-1}(x) = \log_3(x - 1)$ for $x > 0$
      - $f^{-1}(x) = \log_3(x - 1)$ for $x > 1$
    solution: |
      \begin{gather*}
        x = 3^{2y} + 1 \implies
        x - 1 = 3^{2y} \implies
        \log_3(x - 1) = 2y \implies
        \frac{1}{2} \log_3(x - 1) = y \\
        f^{-1}(x) = \frac{1}{2} \log_3(x - 1)
      \end{gather*}
    calculator_active: true
    sections:
      - 2.13
    dok: unknown

