    question: |
      Which of the following is an expression for the inverse of $f(x) = 3^{x} +
      1$, along with its domain?
    answer: $f^{-1}(x) = \log_3(x - 1)$ for $x > 1$
    distractors:
      - $f^{-1}(x) = \frac{1}{2} \log_3(x - 1)$ for $x > 0$
      - $f^{-1}(x) = \frac{1}{2} \log_3(x - 1)$ for $x > 1$
      - $f^{-1}(x) = \log_3(x - 1)$ for $x > 0$
    solution: |
      \begin{gather*}
        x = 3^{y} + 1 \implies
        x - 1 = 3^{y} \implies
        \log_3(x - 1) = y \implies
        f^{-1}(x) = \log_3(x - 1)
      \end{gather*}
