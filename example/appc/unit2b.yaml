  - id: 372040eb-25f2-4165-a5cc-b520437c7a5b
    legacy_ids:
      - 2B.B.8
    question: |
      Solve the equation: $\ln(x - 3) + \ln(x + 4) = 3 \ln 2$
    answer: $x = 4$
    distractors:
      - $x = -5, 4$
      - $x = -4$
      - $x = -4, 3$
    solution: |
      \begin{gather*}
        \ln(x - 3) + \ln(x + 4) = 3 \ln 2 \implies
        \ln\left((x - 3)(x + 4)\right) = \ln 2^3 \implies
        (x - 3)(x + 4) = 8 \implies \\
        x^2 + x - 12 = 8 \implies
        x^2 + x - 20 = 0 \implies
        (x + 5)(x - 4) = 0 \\
        x = 4
      \end{gather*}
      $x = -5$ is an extraneous solution because it is not in the domain of the original equation.
    calculator_active: false
    sections:
      - 2.13
    dok: unknown

