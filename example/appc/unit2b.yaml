  - id: 13ef4abc-2430-440d-bfc9-d0c65782e673
    legacy_ids:
      - 2B.A.3
    question: |
      The functions $f$ and $g$ are given by $f(x) = 10^x$ and $g(x) =
      \log_{10}(x)$. The function $h$ is given by the composition of $h(x) =
      f(g(x))$. Which of the following is true concerning $h$?
    answer: $h$ is a linear function with a slope of 1
    distractors:
      - $h$ is a constant function
      - $h$ is a linear function with a slope of 10
      - $h$ is an exponential function with a base of 10
    solution: |
      $h(x) = f(g(x)) = 10^{\log_{10}(x)} = x$ by the definition of the
      logarithmic function as the inverse of the exponential function.
    calculator_active: false
    sections:
      - '2.10'
    dok: unknown

