    question: |
      The function $g(x) = 3 \cdot 8^x$ is going to be graphed on a semi-log plot
      where equally spaced marks on the $y$-axis correspond to increasing powers
      of 10. Which of the following describes $g$ as graphed on the semi-log
      plot?
    answer: $g$ will appear linear with a slope of $\log_{10} 8$.
    distractors:
      - $g$ will appear linear with a slope of $\log_{10} 3$.
      - $g$ will appear exponential with a common ratio of 5.
      - $g$ will appear linear with a common ratio of 8.
    solution: |
      On the semi-log plot, the graph of $g(x)$ will
      appear as the line given by $y = \log_{10} 8 \cdot x + \log_{10} 3$
    calculator_active: false
    sections:
