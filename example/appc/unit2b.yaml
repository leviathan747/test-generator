  - id: c599f60a-bef9-4bb1-ba15-c2f65f61143c
    legacy_ids:
      - 2B.B.3
    question: |
      Let $f(x) = \log_{10}(ax)$ and $g(x) = \log_{10}(bx^2)$ for positive
      numbers $a$ and $b$. Let $k(x) = g(x) - f(x)$. Which of the following
      expresses $k$ as a single logarithmic expression?
    answer: $k(x) = \log_{10}\left(\frac{bx}{a}\right)$
    distractors:
      - $k(x) = \log_{10}(bx^2 - ax)$
      - $k(x) = 2\log_{10}\left(\frac{b}{a}\right)$
      - $k(x) = \log_{10}(abx^3)$
    solution: |
      \begin{gather*}
        k(x) = g(x) - f(x)
        = \log_{10}(bx^2) - \log_{10}(ax)
        = \log_{10}\left(\frac{bx^2}{ax}\right)
        = \log_{10}\left(\frac{bx}{a}\right)
      \end{gather*}
    calculator_active: false
    sections:
      - 2.12
    dok: unknown

  - id: be7761d6-d1a3-46dc-9c36-84c9a0910408
    legacy_ids:
      - 2B.B.4
    question: |
      The function $g$ is given by $g(x) = \ln(3x + 1) - \ln(x^2 + x - 2)$.
      What are all values of $x$ for which $g(x) < 0$?
    answer: $(3, \infty)$
    distractors:
      - $(-\infty, -1)$ or $(3, \infty)$
      - $(-1, 3)$
      - $(1, 3)$
    solution: |
      Domain: $x > 1$
      \begin{gather*}
        \ln(3x + 1) - \ln(x^2 + x - 2) < 0 \implies
        \ln\left(\frac{3x + 1}{x^2 + x - 2}\right) < 0 \implies
        \frac{3x + 1}{x^2 + x - 2} < 1 \implies \\
        \frac{3x + 1}{x^2 + x - 2} - \frac{x^2 + x - 2}{x^2 + x - 2} < 0 \implies
        \frac{-x^2 + 2x + 3}{x^2 + x - 2} < 0 \implies
        \frac{-(x - 3)(x + 1)}{(x - 1)(x + 2)} < 0
      \end{gather*}
      \sgchart{~-2,-1,~1,3}{g(x): -+-+-}
    calculator_active: false
    sections:
      - 2.13
    dok: unknown

  - id: 5593d8c3-5e9d-4e40-bdc8-ff3a3e13ca4d
