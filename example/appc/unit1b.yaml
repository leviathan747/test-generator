  - id: 619c1f64-0172-4a91-a688-98918d2a2f86
    legacy_ids:
      - 1B.A.6
    question: |
      The function $P(t)$ models the population of cattle on a ranch and is given
      by $P(t) = \frac{3000t}{10 + 5t}$ for $t \ge 0$, where $t$ is measured in
      months since the start of the year. Which of the following describes the
      population of the cattle as time increases?
    answer: The population increases and approaches a value of 600 cows.
    distractors:
      - The population of cattle increases without bound.
      - The population decreases and approaches a value of 0 cows.
      - The population increases and approaches a value of 3000 cows.
    solution: |
      The horizontal end behavior of $P(t)$ is a horizontal asymptote. Since
      the degrees of the numerator and denominator are equal, the asymptote is
      given by the ratio of the leading coefficients.
    calculator_active: false
    sections:
      - 1.7
      - 1.14
    dok: unknown

