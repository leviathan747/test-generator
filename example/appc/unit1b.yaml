  - id: 1425d7e4-9d43-40b3-bc5d-c9cd390c6fc7
    legacy_ids:
      - 1B.B.3
    question: Let $f(x) = \frac{2}{x^3 - x}$ and $g(x) = -\frac{x}{x^2 - 1}$. What are all the intervals on which $f(x) < g(x)$?
    answer: $(-\infty, -1) \cup (0, 1)$
    distractors:
      - $(-1, 0) \cup (1, \infty)$
      - $(-\infty, -1] \cup [0, 1)$
      - $[-1, 1]$
    solution: |
      $\frac{2}{x^3 - x} < -\frac{x}{x^2 - 1} \implies$
      $\frac{2}{x^3 - x} + \frac{x}{x^2 - 1} \cdot \frac{x}{x} < 0 \implies$
      $\frac{x^2 + 2}{x^3 - x} < 0 \implies$
      $\frac{x^2 + 2}{x(x - 1)(x + 1)} < 0$

      \vspace{1em}
      \sgchart{~-1, ~0, ~1}{\frac{x^2 + 2}{x(x - 1)(x + 1)}: -+-+}
    calculator_active: false
    sections:
      - 1.8
    dok: unknown

