    answer: $D(t) = \begin{cases} \frac{1}{6}t & 0 \le t \le 60 \\ 10 + \frac{1}{8}(t - 60) & 60 < t \le 120 \\ \end{cases}$
    distractors:
      - $D(t) = \begin{cases} 6t & 0 \le t \le 60 \\ 10 + 8t & 60 < t \le 120 \\ \end{cases}$
      - $D(t) = \begin{cases} \frac{1}{6}t & 0 \le t \le 60 \\ 10 + \frac{1}{8}t & 60 < t \le 120 \\ \end{cases}$
      - $D(t) = \begin{cases} 6t & 0 \le t \le 60 \\ 10 + 8(t - 60) & 60 < t \le 120 \\ \end{cases}$
    solution: |
      For the first 60 minutes, the marathoner is running at 6 minutes per
      mile ($\frac{1}{6}$ miles per minute), so the function follows the rule
      $\frac{1}{6}t$. From 60 to 120 minutes, the marathoner is running at 8
      minutes per mile ($\frac{1}{8}$ mile per minute). Since this rate
      starts at $t = 60$, 60 must be subtracted from $t$ before multiplying,
      and 10 must be added to represent the distance run during the first 60
      minutes.
