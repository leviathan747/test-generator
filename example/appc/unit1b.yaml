  - id: b4dcb43f-ffe1-428a-8927-ae37a8401410
    legacy_ids:
      - 1B.A.12
    question: |
      Starting at time $t = 0$ minutes, a copy machine makes copies at a constant
      rate of 30 pages per minute. Two minutes after the first copy machine
      begins making copies, a second copy machine makes copies at a constant rate
      of 40 copies per minute so that both machines are simultaneously making
      copies. Both copy machines continue to make copies at their respective
      constant rates until $t = 6$ minutes. Let $C$ represent the total number of
      copies made by the two copy machines after $t$ minutes. Which of the
      following piecewise functions is an appropriate model for the function
      $C(t)$?
    answer: $C(t) = \begin{cases} 30t & 0 \le t \le 2 \\ 60 + 70(t - 2) & 2 < t \le 6 \\ \end{cases}$
    distractors:
      - $C(t) = \begin{cases} 30t & 0 \le t \le 2 \\ 70t & 2 < t \le 6 \\ \end{cases}$
      - $C(t) = \begin{cases} 30t & 0 \le t \le 2 \\ 70(t - 2) & 2 < t \le 6 \\ \end{cases}$
      - $C(t) = \begin{cases} 30t & 0 \le t \le 2 \\ 70t + 60 & 2 < t \le 6 \\ \end{cases}$
    solution: |
      For the first 2 minutes, copies are being made at a rate of 30 per
      minute, so the function follows the rule $30t$. From 2 to 6 minutes,
      copies are being made at the combined rate of 70 copies per minute. We
      know that at 2 minutes, $2 \cdot 30 = 60$ copies have already been
      made. Using the point slope formula for a line ($y = y_1 + m(x - x_1)$),
      with $m = 70$ and the point $(2, 60)$, We can come up the the regression
      $60 + 70(t - 2)$ for $2 < t \le 6$.
    calculator_active: true
    sections:
      - 1.12
      - 1.13
    dok: unknown

