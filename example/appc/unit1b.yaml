  - id: f2667ed4-e44d-431b-8062-482802b8e648
    legacy_ids:
      - 1B.A.1
    question: |
      The graph of function $f$ has a hole at $x = -1$ and a vertical asymptote
      at $x = 3$. Which of the following functions could be $f(x)$?
    answer: $f(x) = \frac{x^2 + 3x + 2}{x^2 - 2x - 3}$ \simplesol{$= \frac{(x + 1)(x + 2)}{(x + 1)(x - 3)}$}
    distractors:
      - $f(x) = \frac{x^2 - x - 6}{x^2 - 2x - 3}$ \simplesol{$= \frac{(x - 3)(x + 2)}{(x - 3)(x + 1)}$}
      - $f(x) = \frac{x^2 - 2x - 3}{x^2 + 3x + 2}$ \simplesol{$= \frac{(x - 3)(x + 1)}{(x + 2)(x + 1)}$}
      - $f(x) = \frac{x^2 + x - 2}{x^2 + 2x - 3}$ \simplesol{$= \frac{(x + 2)(x - 1)}{(x + 3)(x - 1)}$}
    solution: $x = -1$ is a zero of both the numerator and denominator; $x = 3$ is a zero of just the denominator.
    calculator_active: false
    sections:
      - 1.9
      - '1.10'
    dok: unknown

  - id: 78d3131c-4446-4ba8-b183-f72b8f9d594b
    legacy_ids:
      - 1B.A.2
    question: Let $f(x) = x - 3$ and $g(x) = \frac{2x^2 + x - 6}{x + 2}$. What are all the intervals on which $g(x) \ge f(x)$?
    answer: $[0, \infty)$
    distractors:
      - $[-2, 0]$
      - $(-\infty, -2] \cup [0, \infty)$
      - $[-2, 0] \cup \left[\frac{3}{2}, \infty\right)$
    solution: |
      $\frac{2x^2 + x - 6}{x + 2} \ge x - 3 \cdot \frac{x + 2}{x + 2} \implies$
      $\frac{2x^2 + x - 6}{x + 2} \ge \frac{x^2 - x - 6}{x + 2} \implies$
      $\frac{2x^2 + x - 6 - [x^2 - x - 6]}{x + 2} \ge 0 \implies$

      $\frac{x^2 + 2x}{x + 2} \ge 0 \implies$
      $\frac{x(x + 2)}{x + 2} \ge 0$

      \vspace{1em}
      \sgchart{~-2, 0}{\frac{x(x + 2)}{x + 2}: --+}
    calculator_active: false
    sections:
      - 1.8
    dok: unknown

