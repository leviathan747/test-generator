      - All real numbers $x$ where $x \ne -6$, $x \ne 0$, $x \ne -2$, $x \ne 4$
    solution: |
      $r(x) = \frac{(x + 6)(x - 4)}{x(x + 6)(x + 2)}$

      Domain contains all real numbers except zeros of the denominator.
