  - id: cdca8f44-0b2e-47c3-814d-21d5cae6c43c
    legacy_ids:
      - 1B.A.4
    question: |
      The functions $m$ and $n$ are defined for all real numbers. In the $xy$-plane, the graph of $n$ is constructed by
      applying three transformations to the graph of $m$ in this order:

      \begin{itemize}
        \item horizontal dilation by a factor of 2
        \item horizontal translation of 4 units
        \item vertical translation of -8 units
      \end{itemize}

      Which of the following is the correct transformation that maps the graph of $m$ to $n$ in the same $xy$-plane?
    answer: $n(x) = m\left(\frac{1}{2}(x - 4)\right) - 8$
    distractors:
      - $n(x) = m\left(\frac{1}{2}(x + 4)\right) - 8$
      - $n(x) = m\left(2(x + 4)\right) - 8$
      - $n(x) = m\left(2(x - 4)\right) - 8$
    solution: $m(x) \implies m\left(\frac{1}{2}x\right) \implies m\left(\frac{1}{2}(x - 4)\right) \implies m\left(\frac{1}{2}(x - 4)\right) - 8$
    calculator_active: false
    sections:
      - 1.12
    dok: unknown

