  - id: 731681bd-2137-48de-9f2c-715c6e0d1220
    legacy_ids:
      - 1B.A.8
    question: |
      A balanced coin with one side heads ($H$) and the other side tails ($T$) is
      repeatedly flipped, and the results are recorded. The coefficients in the
      expansion of $(H + T)^n$ give the number of ways to get a particular
      combination of heads and tails for $n$ flips of the coin. For example, in
      the expansion of $(H + T)^7$, the term $21H^2T^5$ means there are 21 ways
      to get exactly 2 heads and 5 tails when flipping a coin 7 times. How many
      ways are there to get exactly 2 heads and 4 tails when flipping a balanced
      coin 6 times?
    answer: 15
    distractors:
      - 6
      - 20
      - 48
    solution: |
      The elements of the 6th row of Pascal's Triangle are 1, 6, 15, 20, 15, 6,
      1. These represent the coefficients of the expansion of $(H + T)^6$. The
      fifth element represents the coefficient of the $H^2T^4$ term.
    calculator_active: false
    sections:
      - 1.11
    dok: unknown

