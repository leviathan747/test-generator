  - id: 16
    legacy_id: 3.B.3
    question: |
      Consider the function $f$ defined by $f(x) = 3 \cos(x) - 4$. Which of the
      following is a true statement about the zeros of $f$ on the interval $0
      \le x < 2\pi$?
    answer: There are no zeros in the interval $0 \le x < 2\pi$ because $\textstyle \frac{4}{3}$ is not in the range of the cosine function.
    distractors:
      - There is exactly one zero in the interval $0 \le x < 2\pi$ and its value is given by $\textstyle x = \cos^{-1}\left(\frac{4}{3}\right)$.
      - There are exactly two zeros in the interval $0 \le x < 2\pi$ because there are exactly two locations on the unit circle where the $x$-coordinate is equal to $\textstyle \frac{4}{3}$.
      - There are infinitely many zeros because the cosine function is periodic.
    solution: TODO
    sections:
      - '3.10'
    dok: unknown

