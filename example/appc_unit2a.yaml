      After returning home from vacation, Mr. Starrett notices a large number of
      dandelions in his yard and decides to apply weed killer. The table above
      gives selected values of $D(t)$, where $D$ is the number of dandelions and
      $t$ is the number of days since Mr. Starrett applied the weed killer. If a
      model is constructed to represent these data, which of the following best
      applies to this situation?
    answer: $D(t) = 81 \left( \frac{2}{3} \right)^t$
    distractors:
      - $D(t) = 81 \left( \frac{1}{3} \right)^t$
      - $D(t) = 81 - 27t \phantom{\frac{1}{3}}$
      - $D(t) = 81 - \frac{2}{3}t$
    solution: |
      The initial value for $D(t)$ is 81. Each successive value of $D(t)$ in
      the table is proportional to the previous value with a ratio of
      $\textstyle \frac{2}{3}$. Therefore, an exponential function $ab^x$ where $a = 81$
      and $\textstyle b = \frac{2}{3}$ models this situation.
    sections: []
    dok: unknown

  - id: 10
    legacy_id: 2.A.11
    question: |
      Mary Jo deposits \$300 each month into her retirement account that pays
      4.5\% annually. What will be the value of her investment after 20 years?
    answer: \$116,437.31
    distractors:
      - \$71,625.00
      - \$72,000.00
      - \$73,453.62
    solution: |
      \begin{gather*}
        FV = R \frac{(1 + i)^n - 1}{i} \\
        FV = 300 \frac{(1 + \frac{0.045}{12})^{12 \cdot 20} - 1}{\frac{0.045}{12}} \\
        FV = 116437.3089 \\
      \end{gather*}
    sections: []
    dok: unknown

