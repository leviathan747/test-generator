questions:
  - id: 1
    legacy_id: 2.A.1
    question: |
      \includegraphics{1}

      Values of the terms of a geometric sequence $g_n$ are graphed in the
      figure to the right. Which of the following is an expression  for the
      \emph{n}th term of the geometric sequence?
    answer: $g_n = 8 \left( -\frac{1}{2} \right)^{n-2}$
    distractors:
      - $g_n = 8 \left( \frac{1}{2} \right)^n$
      - $g_n = -16 \left( \frac{1}{2} \right)^{n-1}$
      - $g_n = 8 \left( -\frac{1}{2} \right)^{n+2}$
    solution: |
      $g_n = g_k \cdot r^{n-k}$ \qquad $g_2 = 8$ \\
      The absolute value of each element is half of the element before it and
      alternating between positive and negative values, therefore $r =
      -\frac{1}{2}$.
    sections: []
    dok: unknown

  - id: 2
    legacy_id: 2.A.2
    question: |
      \fullwidth{\begin{center}
        \begin{tabularx}{4in}{ |Y||*{5}{Y|} }
          \hline
          \bm{$n$} & 1 & 5 & 7 & 8 & 15 \\
          \hline
          \bm{$a_n$} & $b$ & 32 & 26 & $c$ & 2 \\
          \hline
        \end{tabularx}
      \end{center}}

      The table above contains selected values of an arithmetic sequence $a_n$ ,
      where $b$ and $c$ are constants. What is the value of $b + c$?
    answer: 67
    distractors:
      - 49
      - 58
      - 76
    solution: |
      $a_n = 32 + d(n - 5)$ \\
      $26 = 32 + d(7 - 5) \implies$
      $26 = 32 + 2d \implies$
      $-6 = 2d \implies$
      $d = -3$ \\
      $b = 32 - 3(1 - 5) = 32 + 12 = 44$ \\
      $c = 32 - 3(8 - 5) = 32 - 9 = 23$ \\
      $44 + 23 = 67$ \\
    sections: []
    dok: unknown

  - id: 3
    legacy_id: 2.A.3
    question: |
      The exponential function $f$ is defined by $f(x) = ab^x$, where $a$ and $b$
      are constants. If $f(2) = 36$ and $\textstyle \frac{f(x + 1)}{f(x)} = 3$ for all
      values of $x$, which of the following is an expression for $f(x)$?
    answer: $4(3)^x$
    distractors:
      - $36 \left( \frac{1}{3} \right)^x$
      - $12(3)^x$
      - $4 \left( \frac{1}{3} \right)^x$
    solution: |
      $b = \textstyle \frac{f(x + 1)}{f(x)} = 3$ \\
      $f(x) = 36(3)^{x - 2} = 36(3^{-2})(3)^x = 4(3)^x$
    sections: []
    dok: unknown

