  - id: 5
    legacy_id: 2.A.5
    question: |
      Let $m(x) = 5 \left( \frac{2}{3} \right)^{x - 1}$. Which of the following
      statements about $m$ is correct?
    answer: $m$ is decreasing and the graph of $m$ is concave up.
    distractors:
      - $m$ is increasing and the graph of $m$ is concave up.
      - $m$ is increasing and the graph of $m$ is concave down.
      - $m$ is decreasing and the graph of $m$ is concave down.
    solution: |
      $a = 5 \qquad b = \frac{2}{3}$ \\
      Because $0 < b < 1$, this curve represents exponential decay. Because $a
      > 0$, $m$ will be positive on its entire domain, therefore it is
      decreasing and concave up.
    sections: []
    dok: unknown

