  - id: 19
    legacy_id: 2.B.6
    question: |
      \fullwidth{\begin{center}
        \begin{tabularx}{4in}{ |Y||*{5}{Y|} }
          \hline
          \bm{$n$} & 1 & 4 & 7 & 9 & 12 \\
          \hline
          \bm{$a_n$} & 15 & $a$ & 33 & $b$ & $c$ \\
          \hline
        \end{tabularx}
      \end{center}}

      The table above contains selected values of an arithmetic sequence $a_n$ ,
      where $a$, $b$, and $c$ are constants. What is the value of $a + b + c$?
    answer: 111
    distractors:
      - 24
      - 48
      - 89
    solution: |
      $a_n = 15 + d(n - 1)$ \\
      $33 = 15 + d(7 - 1) \implies$
      $33 = 15 + 6d \implies$
      $18 = 6d \implies$
      $d = 3$ \\
      $a = 15 + 3(4 - 1) = 15 + 9 = 24$ \\
      $b = 15 + 3(9 - 1) = 15 + 24 = 39$ \\
      $c = 15 + 3(12 - 1) = 15 + 33 = 48$ \\
      $24 + 39 + 48 = 111$ \\
    sections: []
    dok: unknown

