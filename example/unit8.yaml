  - id: 2
    legacy_id: 8.A.2
    question: |
      Identify the definite integral that computes the volume of the solid
      generated by revolving the region bounded by the graph of $y = x^3$, and
      the line $y = x$, between $x = 0$ and $x = 1$ about the $y$-axis.
    answer: $\pi \int_0^1 (y^\frac{2}{3} - y^2) dy$
    distractors:
      - $\pi \int_0^1 (x^6 - x^2) dx$
      - $\pi \int_0^1 (x^2 - x^6) dx$
      - $\pi \int_0^1 (y^\frac{1}{3} - y)^2 dy$
    solution: TODO
    sections: []
    dok: unknown

  - id: 3
    legacy_id: 8.A.3
    question: |
      The base of a solid is the region in the first quadrant bounded by the line
      $y = -\frac{1}{2}x + 2$ and the  coordinate axes. If every cross-section
      perpendicular to the $x$-axis is a square, which of the following integrals
      represents volume of the solid.
    answer: $\int_0^4 \left[ \left( -\frac{1}{2}x + 2 \right)^2 \right] dx$
    distractors:
      - $\int_0^2 \left[ -\frac{1}{2}x + 2 \right] dx$
      - $\int_0^2 \left[ \left( -\frac{1}{2}x + 2 \right)^2 \right] dx$
      - $\int_0^4 \left[ -\frac{1}{2}x + 2 \right] dx$
    solution: TODO
    sections: []
    dok: unknown

