  - id: c2886a1e-b20f-422e-8170-fa74f8ae7c26
    legacy_ids:
      - 5.A.1
    related_to:
      - 46f87a40-2ffd-4394-8b5a-ae6d1dceffdb
    question: |
      If $f$ is continuous on a closed interval $[a, b]$, which of the following
      \emph{must} be true?
    answer: There is a number $c$ in the closed interval $[a, b]$ such that $f(c)\ge f(x)$ for all $x$ in $[a, b]$.
    distractors:
      - There is a number $c$ in the open interval $(a, b)$ such that $f(c)=0$.
      - There is a number $c$ in the open interval $(a, b)$ such that $f'(c)=0$.
      - There is a number $c$ in the closed interval $[a, b]$ such that $f'(c)=\frac{f(b)-f(a)}{b-a}$.
    solution: |
      Because $f$ is continuous on a closed interval, the Extreme Value Theorem
      guarantees that $f$ attains an absolute maximum value $f(c)$ for some $c$
      in $[a, b]$, so $f(c) \ge f(x)$ for all $x$ in $[a, b]$.
    calculator_active: false
    sections: []
    dok: unknown
    review: check solution

