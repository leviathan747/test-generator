      \begin{gather*}
        f'(x) = (x + 2)(x - 2)g(x), \quad g(x) < 0
      \end{gather*}
      \sgchart{-2,2}{f'(x): -+-}
      $f$ has a relative minimum at $x = -2$ and a relative maximum at $x = 2$.
    calculator_active: false
    sections: []
