      - There is a number $c$ in the closed interval $[a, b]$ such that $f(c) > f(x)$ for all $x$ in $[a, b]$.
    solution: |
      Because $f$ is continuous on $[a, b]$ and differentiable on $(a, b)$, the
      Mean Value Theorem guarantees that there is a number $c$ in $(a, b)$ such
      that $f'(c) = \frac{f(b) - f(a)}{b - a}$.
