    question: |
      Let $f''(x) = 3x^2 - 4$ and let $f(x)$ have first derivative critical
      numbers at -2, 0, and 2. Use the \emph{second derivative test} to determine
      which critical number(s), if any, give a relative minimum.
    answer: -2 and 2
    distractors:
      - 0
      - 0 and -2
      - 2
    solution: |
      \begin{gather*}
        f''(-2) = 3(-2)^2 - 4 = 8 > 0 \implies \text{relative minimum} \\
        f''(0) = 3(0)^2 - 4 = -4 < 0 \implies \text{relative maximum} \\
        f''(2) = 3(2)^2 - 4 = 8 > 0 \implies \text{relative minimum}
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: check solution

