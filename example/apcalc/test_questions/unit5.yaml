      If $f$ is the function defined by $f(x) = 3x^5 - 5x^4$, what are all the
      \textit{x}-coordinates of points of inflection for the graph of $f$?
    answer: 1
    distractors:
      - -1, 0, and 1
      - -1
      - 0 and 1
    solution: |
      \begin{gather*}
        f'(x) = 15x^4 - 20x^3 \\
        f''(x) = 60x^3 - 60x^2 = 60x^2(x - 1)
      \end{gather*}
      $f''$ changes sign only at $x = 1$ (at $x = 0$ the factor $x^2$ does not change sign), so the only point of inflection is at $x = 1$.
