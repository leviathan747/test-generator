    question: |
      Given $f(x) = -3 + \frac{20}{x}$, find all $c$ in the interval $(-5, -2)$ such
      that $f'(c) = \frac{f(-2) - f(-5)}{-2 - (-5)}$.
    answer: $-\sqrt{10}$
    distractors:
      - $-\sqrt{15}$
      - $\pm\sqrt{15}$
      - $\pm\sqrt{10}$
    solution: |
      \begin{gather*}
        f'(x) = -\frac{20}{x^2} \\
        f(-2) = -3 + \frac{20}{-2} = -3 - 10 = -13 \\
        f(-5) = -3 + \frac{20}{-5} = -3 - 4 = -7 \\
        -\frac{20}{c^2} = \frac{-13 - (-7)}{-2 - (-5)} \implies
        -\frac{20}{c^2} = \frac{-6}{3} \implies
        -\frac{20}{c^2} = -2 \implies
        20 = 2c^2 \implies
        c^2 = 10 \\
        c = -\sqrt{ 10 }
      \end{gather*}
      ($c = -\sqrt{10}$ since $c$ must be in $(-5, -2)$)
    calculator_active: false
    sections: []
    dok: unknown
    review: none

