  - id: b3af64b8-07bf-4193-9a87-9fe99ed5fd55
    legacy_ids:
      - 5.A.4
    related_to:
      - 92fa180a-a653-4be4-95ed-f5b8136f131a
    question: |
      Let $f$ be a function defined and continuous on the closed interval $[a, b]$.
      If $f$ has a relative maximum at $c$ and $a < c < b$, which of the
      following must be true?

      \textbf{I.\phantom{II}} \quad $f'(c)$ must exist. \\
      \textbf{II.\phantom{I}} \quad If $f'(c)$ exists, then $f'(c) = 0$. \\
      \textbf{III.} \quad If $f''(c)$ exists, then $f''(c) > 0$. \\
    answer: II only
    distractors:
      - III only
      - I and III only
      - II and III only
    solution: |
      \textbf{I.} False: $f$ could have a sharp corner at $c$ (e.g. $f(x) = -|x|$),
      so $f'(c)$ need not exist. \\
      \textbf{II.} True: if $f'(c)$ exists at a relative maximum, then $f'(c) = 0$. \\
      \textbf{III.} False: if $f''(c)$ exists at a relative maximum, the graph is
      concave down, so $f''(c) \le 0$.
    calculator_active: false
    sections: []
    dok: unknown
    review: check solution

  - id: 26aee9f5-33cf-410a-baf2-f3d600aedacd
    legacy_ids:
      - 5.A.5
    related_to:
      - e51d31e1-380a-4d98-86ab-408476093611
    question: |
      Given $f(x) = 6 - \frac{10}{x}$, find all $c$ in the interval $(2, 5)$ such
      that $f'(c) = \frac{f(5) - f(2)}{5 - 2}$.
    answer: $\sqrt{10}$
    distractors:
      - $\sqrt{15}$
      - $\pm\sqrt{15}$
      - $\pm\sqrt{10}$
    solution: |
      \begin{gather*}
        f'(x) = \frac{10}{x^2} \\
        f(5) = 6 - \frac{10}{5} = 4 \qquad f(2) = 6 - \frac{10}{2} = 1 \\
        \frac{10}{c^2} = \frac{f(5) - f(2)}{5 - 2} = \frac{4 - 1}{3} = 1 \implies
        c^2 = 10 \implies c = \sqrt{10}
      \end{gather*}
      ($c = \sqrt{10}$ since $c$ must be in $(2, 5)$)
    calculator_active: false
    sections: []
    dok: unknown
    review: check solution

  - id: 9eaac5c4-b4bc-473c-a0f2-096b642424d8
