    question: |
      State the reason(s) why Rolle’s Theorem does not apply to the function
      $f(x) = \frac{2}{(x + 1.5)^2}$ on the interval $[-1, 1]$.
    answer: $f(-1) \ne f(1)$
    distractors:
      - $f$ is not continuous at $x = -1.5$
      - $f$ is not defined at $x = -1$ and $x = 1$
      - Both \emph{A} and \emph{B}
    solution: |
      \begin{gather*}
        f(-1) = \frac{2}{(-1 + 1.5)^2} = \frac{2}{0.25} = 8 \qquad
        f(1) = \frac{2}{(1 + 1.5)^2} = \frac{2}{6.25} = 0.32
      \end{gather*}
      Since $-1.5$ is not in $[-1, 1]$, $f$ is continuous and differentiable on the interval, but $f(-1) \ne f(1)$, so Rolle's Theorem does not apply.
