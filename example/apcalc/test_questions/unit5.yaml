      If $g$ is a differentiable function such that $g(x) < 0$ for all real
      numbers $x$ and if $f'(x) = (x^2 -4)g(x)$, which of the following is true?
    answer: $f$ has a relative minimum at $x = -2$ and a relative maximum at $x = 2$.
    distractors:
      - $f$ has relative maxima at $x = -2$ and $x = 2$.
      - $f$ has relative minima at $x = -2$ and $x = 2$.
      - $f$ has a relative maximum at $x = -2$ and a relative minimum at $x = 2$.
