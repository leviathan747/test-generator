    question: Find $\lim_{x \to 0} \frac{\ln(2 - e^x)}{e^x - 1}$
    answer: -1
    distractors:
      - 0
      - 1
      - The limit does not exist
    solution: |
      $\lim_{x \to 0} \ln(2 - e^x) = \ln(2 - 1) = \ln 1 = 0$
      $\qquad \lim_{x \to 0} e^x - 1 = 1 - 1 = 0$
      \qquad L'Hospital's Rule applies

      $\lim_{x \to 0} \frac{\ln(2 - e^x)}{e^x - 1}$
      $= \lim_{x \to 0} \frac{\frac{-e^x}{2 - e^x}}{e^x}$
      $= \frac{\frac{-1}{2 - 1}}{1} = -1$
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 1688cf33-eb55-4726-bbe3-9607f070dd3b
    legacy_ids:
      - 4.B.7
    related_to:
      - 3cbdde43-c698-4257-9d4b-298562758f5e
    question: |
      Approximate the value of $\sqrt{27}$ using the tangent line to the graph
      of $f(x) = \sqrt{x}$ at $x = 25$.
    answer: 5.2
    distractors:
      - 6.1
      - 5.4
      - 4.8
    solution: |
      \begin{gather*}
        L(x) = f(25) + f'(25)(x - 25) \\
        f(25) = \sqrt{25} = 5 \\
        f'(x) = \frac{1}{2 \sqrt x} \qquad
        f'(25) = \frac{1}{2 \sqrt{25}} = \frac{1}{10} \\
        L(x) = 5 + \frac{1}{10}(x - 25) \\
        L(27) = 5 + \frac{1}{10}(27 - 25)
        = 5 + \frac{1}{10}(2) = 5.2
      \end{gather*}
