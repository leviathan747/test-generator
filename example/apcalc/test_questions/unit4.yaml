    question: |
      People are entering the line to a roller coaster at a rate modeled by
      $f(t)$ people per hour and entering the ride at a rate modeled by $g(t)$
      people per hour, where $t$ is measured in hours. The functions $f$ and $g$
      are non-negative and differentiable for all $t$. Which of the following
      inequalities indicates that the number of people in the line is increasing
      at time $t$?
    answer: $f(t) - g(t) > 0$
