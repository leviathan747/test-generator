  - id: 6b1084d0-6a86-48bb-8aae-c54aebd3b115
    legacy_ids:
      - 4.A.8
    related_to:
      - 045016b3-50f6-42b4-b7e8-6b91343f23ce
    question: |
      The sides of the rectangle below increase in such a way that $\textstyle
      \frac{dz}{dt} = 1$ and $\textstyle \frac{dy}{dt} = \frac{1}{3}$.  At the
      instant when $x = 4$ and $y = 3$, what is the value of $\textstyle
      \frac{dx}{dt}$?

      \fullwidth{\begin{center}
        \input{figures/12.tex}
      \end{center}}
    answer: 1
    distractors:
      - $\frac{1}{3}$
      - 3
      - 5
    solution: |
      \begin{gather*}
        x^2 + y^2 = z^2 \implies 2x \frac{dx}{dt} + 2y \frac{dy}{dt} = 2z \frac{dz}{dt} \\
        z = \sqrt{(4)^2 + (3)^2} = 5 \\
        2(4) \frac{dx}{dt} + 2(3)\left(\frac{1}{3}\right) = 2(5)(1) \implies
        8 \frac{dx}{dt} + 2 = 10 \implies
        8 \frac{dx}{dt} = 8 \implies \frac{dx}{dt} = 1
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 3affc1e0-ce29-4dcd-a6ec-29565b110b89
