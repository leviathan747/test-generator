    question: |
      A particle's position is represented by the position function $s(t) = t^2 -
      2t$ for $t \ge 0$, where $s$ is measured in feet and $t$ is measured in
      seconds. On what time interval(s) is the particle \emph{speeding up}?
    answer: $t > 1$
    distractors:
      - $t < 1$
      - $t > 2$
      - No solutions
    solution: |
      \begin{gather*}
        v(t) = s'(t) = 2t - 2 \\
        a(t) = v'(t) = 2
      \end{gather*}
      Since $a(t) > 0$ for $t \ge 0$ and $v(t) > 0$ for $t > 1$,
      the particle is speeding up for $t > 1$
