    related_to:
      - 7c384d65-88c9-4438-a0bc-4633600f84f6
    question: |
      A particle's position is represented by the position function $s(t) = t^2 -
      t$ for $t \ge 0$, where $s$ is measured in feet and $t$ is measured in
      seconds. When is the particle moving to the right?
    answer: $t > \frac{1}{2}$
    distractors:
      - $t > 0$
      - $t > 1$
      - $t > 2$
    solution: |
      $v(t) = s'(t) = 2t - 1$

      $v(t) > 0 \implies t > \frac{1}{2}$
    calculator_active: false
