  - id: a771e021-9bee-4275-9ef7-79bbe5546031
    legacy_ids:
      - 4.B.10
    related_to:
      - 114acf7b-3906-45f0-9246-01dd93400cfa
    question: |
      A tank with the shape of a right circular cone with a height twice that
      of its radius is being filled by water at a constant rate of 1500 liters
      per hour. At what rate is the water level in the tank rising when the
      depth of water is 1 meter? (1000 liters = 1 cubic meter, $V = \frac{1}{3}
      \pi r^2 h$)
    answer: $\frac{6}{\pi}$ meters per hour
    distractors:
      - $\frac{\pi}{6}$ meters per hour
      - $\frac{\pi}{4}$ meters per hour
      - $\frac{6}{\pi}$ liters per hour
    solution: |
      \begin{gather*}
        \frac{dV}{dt} = 1.5
        \qquad r = \frac{h}{2} \implies V = \frac{1}{12} \pi h^3 \\
        \frac{dV}{dt} = \frac{1}{12} \pi \left[ 3h^2 \cdot \frac{dh}{dt} \right] \\
        1.5 = \frac{1}{12} \pi \left[ 3(1)^2 \cdot \frac{dh}{dt} \right] \\
        1.5 = \frac{1}{4} \pi \cdot \frac{dh}{dt} \\
        \frac{dh}{dt} = \frac{6}{\pi} \text{ meters per hour} \\
      \end{gather*}
