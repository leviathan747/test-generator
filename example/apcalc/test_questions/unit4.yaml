  - id: cc26d99a-8bcc-465d-aa42-b3b7dde819e1
    legacy_ids:
      - 4.A.1
    related_to:
      - 7ac2e915-680c-4ab3-b860-5b76e4468c5e
    question: Find $\lim_{x \to 0} \frac{e^x - \cos x}{4 \sin x}$
    answer: $\frac{1}{4}$
    distractors:
      - $\frac{e - 1}{4}$
      - $-\frac{1}{2}$
      - $\infty$
    solution: |
      $\lim_{x \to 0} e^x - \cos x = 1 - 1 = 0$
      $\qquad \lim_{x \to 0} 4 \sin x = 0$
      \qquad L'Hospital's Rule applies

      $\lim_{x \to 0} \frac{e^x - \cos x}{4 \sin x}$
      $= \lim_{x \to 0} \frac{e^x + \sin x}{4 \cos x}$
      $= \frac{1 + 0}{4 \cdot 1} = \frac{1}{4}$
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 34060c21-119b-4a3a-86c9-b390c1672a66
    legacy_ids:
