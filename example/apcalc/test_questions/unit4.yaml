  - id: 96d7ccfc-b004-4348-8040-879677a217f2
    legacy_ids:
      - 4.B.4
    related_to:
      - 3affc1e0-ce29-4dcd-a6ec-29565b110b89
    question: |
      Let $f$ be a function where $f(1) = 2$ and $f'(1) = -3$, and let $L(x)$ be
      the linear approximation of $f$ using the line tangent to $f$ at $x = 1$.
      At what value of $k$ is the approximation of $f$ equal to 4?
    answer: $\frac{1}{3}$
    distractors:
      - $-\frac{1}{3}$
      - -2
      - 3
    solution: |
      \begin{gather*}
        L(x) = f(1) + f'(1)(x - 1) = 2 - 3(x - 1) \\
        L(k) = 4 \\
        2 - 3(k - 1) = 4 \\
        3(k - 1) = -2 \\
        k - 1 = -\frac{2}{3} \\
        k = \frac{1}{3}
      \end{gather*}
      \vspace{-2em}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 33a1eb45-6d00-4759-a24e-7858e1631301
    legacy_ids:
      - 4.B.5
    related_to:
      - 114acf7b-3906-45f0-9246-01dd93400cfa
    question: |
      A boy flies a kite which is 30 meters directly above his hand. If the
      wind carries the kite horizontally at the rate of 10 meters/min while
      keeping a constant altitude, which of the following describes what is
      happening to the length of the string at the moment when 50 meters of
      string has been let out?

      \fullwidth{\begin{center}
        \input{figures/16.tex}
      \end{center}}
    answer: increasing at a rate of 8 meters/min
    distractors:
      - decreasing at a rate of 8 meters/min
      - increasing at a rate of 12 meters/min$^2$
      - decreasing at a rate of 12 meters/min$^2$
    solution: |
      \begin{gather*}
        \frac{db}{dt} = 10 \qquad c = 50 \qquad b = \sqrt{(50)^2 - (30)^2} = 40
        \qquad (30)^2 + b^2 = c^2 \qquad \implies 2b\frac{db}{dt} = 2c\frac{dc}{dt} \\
        2(40)(10) = 2(50)\frac{dc}{dt} \\
        \frac{dc}{dt} = 8\text{ meters/min}
      \end{gather*}
      \vspace{-2em}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

