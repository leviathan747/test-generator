    dok: unknown
    review: none

  - id: 78cc5dbf-c6b8-4833-b7d5-85ee8813ad4f
    legacy_ids:
      - 4.A.3
    related_to:
      - 36f127f2-5ad0-44e9-b7bc-34cd969186a6
    question: Find $\lim_{x \to 0} \frac{1 - e^x}{\ln(2 - e^x)}$
    answer: 1
    distractors:
      - $\frac{2}{e}$
      - 0
      - The limit does not exist
    solution: |
      $\lim_{x \to 0} 1 - e^x = 1 - 1 = 0$
      $\qquad \lim_{x \to 0} \ln(2 - e^x) = \ln(2 - 1) = \ln 1 = 0$
      \qquad L'Hospital's Rule applies

      $\lim_{x \to 0} \frac{1 - e^x}{\ln(2 - e^x)}$
      $= \lim_{x \to 0} \frac{-e^x}{\frac{-e^x}{2 - e^x}}$
      $= \frac{-1}{\frac{-1}{2 - 1}} = 1$
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 3cbdde43-c698-4257-9d4b-298562758f5e
    legacy_ids:
      - 4.A.4
    related_to:
      - 1688cf33-eb55-4726-bbe3-9607f070dd3b
    question: |
      Let $f$ be the function given by $f(x) = 2 \cos x + 1$. Approximate the
      value of $f(1.5)$ using the tangent line to the graph of $f$ at $\textstyle
      x = \frac{\pi}{2}$
    answer: $\pi - 2$
    distractors:
      - -2
      - 1
      - $4 - \pi$
    solution: |
      \begin{gather*}
        L(x) = f\left(\frac{\pi}{2}\right) + f'\left(\frac{\pi}{2}\right)\left(x - \frac{\pi}{2}\right) \\
        f\left(\frac{\pi}{2}\right) = 2 \cdot 0 + 1 = 1 \\
        f'(x) = -2 \sin x \qquad
        f'\left(\frac{\pi}{2}\right) = -2 \cdot 1 = -2 \\
        L(x) = 1 - 2\left(x - \frac{\pi}{2}\right) \\
        L(1.5) = 1 - 2\left(1.5 - \frac{\pi}{2}\right) = 1 - 3 + \pi = \pi - 2
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 114acf7b-3906-45f0-9246-01dd93400cfa
    legacy_ids:
      - 4.A.5
    related_to:
      - a771e021-9bee-4275-9ef7-79bbe5546031
    question: |
      A spherical balloon is being inflated in such a way that its radius
      is increasing at a rate of $\textstyle \frac{1}{2}$ cm/s. How fast is
      the volume increasing when the radius is 3 cm? $\textstyle \left( V = \frac{4}{3} \pi r^3 \right)$
    answer: $18\pi \text{ cm}^3/\text{s}$
    distractors:
      - $36 \text{ cm}^3/\text{s}$
      - $12\pi \text{ cm}^3/\text{s}$
      - $36\pi \text{ cm}^3/\text{s}$
    solution: |
      \begin{gather*}
        \frac{dV}{dt} = \frac{4}{3} \pi \cdot 3r^2 \cdot \frac{dr}{dt} \\
        r = 3, \quad \frac{dr}{dt} = \frac{1}{2} \\
        \frac{dV}{dt} = \frac{4}{3} \pi \cdot 3(3)^2 \cdot \frac{1}{2} \\
        \frac{dV}{dt} = 18 \pi
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: 94c4c1c6-e68f-4859-a696-a973273b4ab1
    legacy_ids:
      - 4.A.6
    related_to:
      - 7fd35ffa-66c3-43cc-81b6-44584bf92dad
    question: |
      The length of a rectangle is increasing at a rate of 3 m/s while the width is increasing
      at a rate of 2 m/s. When the length is 6 m and the width is 4 m, the area is
    answer: increasing at a rate of 24 m$^2$/s
    distractors:
      - decreasing at a rate of 24 m$^2$/s
      - increasing at a rate of 26 m$^2$/s
      - decreasing at a rate of 26 m$^2$/s
    solution: |
      \begin{gather*}
        A = l \cdot w
        \qquad \frac{dl}{dt} = 3
        \qquad \frac{dw}{dt} = 2
        \qquad l = 6
        \qquad w = 4
        \qquad \frac{dA}{dt} = l \frac{dw}{dt} + w \frac{dl}{dt} \\
        \frac{dA}{dt} = 6 \cdot 2 + 4 \cdot 3
        = 12 + 12 = 24
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

