    question: |
      A 12,000 liter tank of water is filled to capacity. At time $t = 0$, water
      begins to drain out of the tank at a rate modeled by $r(t)$, measured in
      liters per hour, where $r$ is given by the piecewise-defined function:
      \[
        r(t) = \begin{cases}
          \frac{600t}{t + 3} & 0 \le t \le 5 \\
          1000e^{-0.2t} & t > 5 \\
        \end{cases}
      \]
      Which of the following identifies the correct value of $r'(3)$ and
      accurately and thoroughly explains the meaning of that value in the context
      of the problem?
    answer: The rate at which water is draining from the tank is increasing by 50 liters/hour$^2$ at time $t = 3$ hours.
    distractors:
      - The amount of water in the tank is increasing at a rate of 50 liters/hour at time $t = 3$ hours.
      - The rate at which water is draining from tank is decreasing by 109.762 liters/hour$^2$ at time $t = 3$ hours.
      - The amount of water in the tank is decreasing at a rate of 109.762 liters/hour at time $t = 3$ hours.
    solution: $\frac{d}{dt} \left[ \frac{600t}{t + 3} \right]_{t = 3} = 50$
    calculator_active: true
    sections: []
    dok: unknown
    review: none

  - id: 0d339e3c-3f56-4d72-a5a3-6ac63786ced7
    legacy_ids:
      - 4.A.16
    related_to:
      - 7fd35ffa-66c3-43cc-81b6-44584bf92dad
    question: |
      If the base, $b$, of a triangle is increasing at a rate of 3 inches per
      minute while its height, $h$, is decreasing at a rate of 3 inches per
      minute, which of the following must be true about the area, $A$, of the
      triangle?
    answer: $A$ is decreasing only when $b > h$
    distractors:
      - $A$ is always increasing
      - $A$ is decreasing only when $b < h$
      - $A$ is always decreasing
    solution: |
      \begin{gather*}
        A = \frac{1}{2}bh \\
        \frac{dA}{dt} = \frac{1}{2} \left[ b \frac{dh}{dt} + h \frac{db}{dt} \right] \implies
        \frac{dA}{dt} = \frac{1}{2} \left[ b \cdot -3 + h \cdot 3 \right] \implies
        \frac{dA}{dt} = \frac{3}{2} \left[ h - b \right] \\
        b > h \implies \frac{dA}{dt} < 0
      \end{gather*}
    calculator_active: true
    sections: []
    dok: unknown
    review: none

