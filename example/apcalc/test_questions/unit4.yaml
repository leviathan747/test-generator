    question: |
      A particle is moving along a hyperbola $xy = 8$. As it reaches the point
      $(4, 2)$, the $y$-coordinate is decreasing at a rate of 3 cm/s. How fast
      is the $x$-coordinate of the point changing at that instant?
    answer: increasing at a rate of 6 cm/s
    distractors:
      - increasing at a rate of 12 cm/s
      - decreasing at a rate of 6 cm/s
      - the $x$-coordinate of the particle is not changing
    solution: |
