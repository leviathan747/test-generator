    related_to:
      - 96d7ccfc-b004-4348-8040-879677a217f2
    question: |
      Let $f$ be a function where $f(-2) = -2$ and $f'(-2) = 3$, and let $L(x)$ be
      the linear approximation of $f$ using the line tangent to $f$ at $x = -2$.
      At what value of $k$ is the approximation of $f$ equal to 4?
    answer: 0
    distractors:
      - -2
      - $\frac{1}{3}$
      - 3
    solution: |
      \begin{gather*}
        L(x) = f(-2) + f'(-2)(x + 2) = -2 + 3(x + 2) \\
        L(k) = 4 \\
        -2 + 3(k + 2) = 4 \\
        3(k + 2) = 6 \\
        k + 2 = 2 \\
        k = 0
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown
    review: none

