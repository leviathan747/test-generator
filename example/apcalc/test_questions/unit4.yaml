    question: |
      If the width, $w$, of a rectangle is increasing at a constant rate of 2 cm/s and the length, $l$, of the rectangle is decreasing
      at a constant rate of 2 cm/s, which statement is true about the perimeter, $P$, of the rectangle?
    answer: $P$ is not changing
    distractors:
      - $P$ is increasing when $l > w$
      - $P$ is increasing when $l < w$
      - $P$ is always increasing
    solution: |
      \begin{gather*}
        P = 2l + 2w \implies
        \frac{dP}{dt} = 2\frac{dl}{dt} + 2\frac{dw}{dt} \\
        \frac{dP}{dt} = 2(-2) + 2(2) = 0
      \end{gather*}
      Since $\frac{dP}{dt} = 0$ for all values of $l$ and $w$, $P$ is not changing.
    calculator_active: true
    sections: []
    dok: unknown
    review: none

