    question: |
      The sides of the rectangle below increase in such a way that
      $\textstyle \frac{dx}{dt} = 1$ and $\textstyle \frac{dy}{dt} = \frac{2}{3}$.
      At the instant when $x = 4$ and $y = 3$, what is the value of
      $\textstyle \frac{dz}{dt}$?

      \fullwidth{\begin{center}
        \input{figures/12.tex}
      \end{center}}
    answer: $\frac{6}{5}$
    distractors:
      - $\frac{2}{3}$
      - $\frac{1}{6}$
      - $\frac{1}{3}$
    solution: |
      \begin{gather*}
        x^2 + y^2 = z^2 \implies 2x \frac{dx}{dt} + 2y \frac{dy}{dt} = 2z \frac{dz}{dt} \\
        z = \sqrt{(4)^2 + (3)^2} = 5 \\
        2(4)(1) + 2(3)\left(\frac{2}{3}\right) = 2(5) \frac{dz}{dt} \implies
        10 \frac{dz}{dt} = 12 \implies \frac{dz}{dt} = \frac{6}{5}
      \end{gather*}
