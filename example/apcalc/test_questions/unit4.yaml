  - id: 7ac2e915-680c-4ab3-b860-5b76e4468c5e
    legacy_ids:
      - 4.B.2
    related_to:
      - cc26d99a-8bcc-465d-aa42-b3b7dde819e1
    question: Find $\lim_{x \to 0} \frac{e^x - x - 1}{\cos x - 1}$
    answer: -1
    distractors:
      - 1
      - 0
      - The limit does not exist
    solution: |
      $\lim_{x \to 0} e^x - x - 1 = 1 - 0 - 1 = 0$
      $\qquad \lim_{x \to 0} \cos x - 1 = 1 - 1 = 0$
      \qquad L'Hospital's Rule applies

      $\lim_{x \to 0} \frac{e^x - x - 1}{\cos x - 1}$
      $= \lim_{x \to 0} \frac{e^x - 1}{- \sin x}$

      $\lim_{x \to 0} e^x - 1 = 1 - 1 = 0$
      $\qquad \lim_{x \to 0} -\sin x = 0$
      \qquad L'Hospital's Rule applies again

      $\lim_{x \to 0} \frac{e^x - 1}{- \sin x}$
      $= \lim_{x \to 0} \frac{e^x}{- \cos x}$
      $= \frac{1}{-1} = -1$
    calculator_active: false
    sections: []
    dok: unknown
    review: none

  - id: da213643-cde4-4a47-a4bf-a67e23d65675
