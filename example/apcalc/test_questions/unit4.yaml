    question: |
      \fullwidth{\begin{center}
        Let $f$ be the continuous function consisting of two line segments as
        shown in the figure below. The differentiable function $g$ and its
        first derivative are given in the table for selected values of $x$. Find
        $\lim_{x \to 2} \frac{g(x)}{f(x)}$.

        \begin{multicols}{2}
          \input{figures/14.tex}

          \phantom{space}

          \begin{tabularx}{1.5in}{ |*{3}{Y|} }
            \hline
            \rowcolor{lightgray}
            \bm{$x$} & \bm{$g(x)$} & \bm{$g'(x)$} \\
            \hline
            1 & 5 & -1 \\
            \hline
            2 & 0 & -3 \\
            \hline
            4 & 2 & 3 \\
            \hline
          \end{tabularx}
        \end{multicols}
      \end{center}}
    answer: $\frac{3}{2}$
    distractors:
      - 0
      - $\frac{2}{3}$
      - Does not exist
    solution: |
      \begin{gather*}
        \lim_{x \to 2} g(x) = 0, \quad
        \lim_{x \to 2} f(x) = 0
        \implies \text{L'Hospital's Rule applies} \\
        \lim_{x \to 2} \frac{g(x)}{f(x)}
        = \lim_{x \to 2} \frac{g'(x)}{f'(x)}
        = \frac{-3}{-2}
      \end{gather*}
    calculator_active: true
    sections: []
    dok: unknown
    review: none

  - id: aad4ce95-bc7d-4642-9ced-b4094e0b333d
    legacy_ids:
      - 4.A.14
    related_to:
      - 02229cc1-c877-417b-b66d-a0b1478c1093
    question: |
      A point moves along the curve $y = 2x^2 + 1$ in such a way that the $y$
      value is decreasing at a rate of 2 units per second. At what rate is $x$
      changing when $x = -3$?
    answer: increasing by $\textstyle \frac{1}{6}$ unit/s
    distractors:
      - decreasing by $\textstyle \frac{1}{3}$ unit/s
      - increasing by $\textstyle \frac{1}{3}$ unit/s
      - decreasing by $\textstyle \frac{1}{6}$ unit/s
    solution: |
      \begin{gather*}
        \frac{dy}{dt} = 4x \frac{dx}{dt} \implies
        -2 = 4(-3) \frac{dx}{dt} \implies
        -2 = -12 \frac{dx}{dt} \implies
        \frac{dx}{dt} = \frac{-2}{-12} = \frac{1}{6}
      \end{gather*}
    calculator_active: true
    sections: []
    dok: unknown
    review: none

  - id: 707abdbd-01de-4708-94c0-1d7aa9e4a56a
