      - $f(t) > 0$
      - $f'(t) > 0$
      - $f'(t) - g'(t) > 0$
    solution: |
      The number of people in line will be increasing when the difference
      between the rate at which people are joining the line and the rate at
      which people are exiting the line (entering the ride) is positive.
    calculator_active: false
    sections: []
    dok: unknown
