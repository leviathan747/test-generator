  - id: c9d6e17f-3a8d-442f-8b81-3f0ff561d3e0
    question: |
      Use the graph of $y = f(x)$ below to find $\lim_{x \to -4^+} f(x)$.
      \fullwidth{\begin{center}
        \input{images/27.tex}
      \end{center}}
    answer: 0
    distractors:
      - 2
      - 1
      - does not exist
    solution: |
      As $x \to -4$ from the right, we follow the branch of the graph to the
      right of $x = -4$ toward the open circle at $(-4, 0)$, so
      $\lim_{x \to -4^+} f(x) = 0$.

      Note that the value of the function at $x = -4$ (the filled dot at
      $(-4, 1)$) does not affect the limit.
