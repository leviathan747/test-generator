  - id: 1
    legacy_id: 5.A.1
    question: |
      If $f$ is continuous on a closed interval $[a, b]$, which of the following
      \emph{must} be true?
    answer: There is a number $c$ in the closed interval $[a, b]$ such that $f(c)\ge f(x)$ for all $x$ in $[a, b]$.
    distractors:
      - There is a number $c$ in the open interval $(a, b)$ such that $f(c)=0$.
      - There is a number $c$ in the open interval $(a, b)$ such that $f'(c)=0$.
      - There is a number $c$ in the closed interval $[a, b]$ such that $f'(c)=\frac{f(b)-f(a)}{b-a}$ for all $x$ in $[a, b]$.
    solution: TODO
    sections: []
    dok: unknown

