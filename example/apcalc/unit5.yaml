  - id: 22
    legacy_id: 5.B.7
    question: |
      Let $f''(x) = 3x^2 - 3$ and let $f(x)$ have first derivative critical
      numbers at -1 and 2. Use the \emph{second derivative test} to determine
      which critical number(s), if any, give a relative minimum.
    answer: 2
    distractors:
      - -1
      - -1 and 2
      - neither
    solution: |
      \begin{gather*}
        f''(-1) = 3(-1)^2 - 3 = 0 \implies \text{neither max nor min} \\
        f''(2) = 3(2)^2 - 3 = 9 > 0 \implies \text{relative minimum}
      \end{gather*}
    sections: []
    dok: unknown

