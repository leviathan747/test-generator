  - id: 16
    legacy_id: 5.B.1
    question: |
      If $g$ is a strictly decreasing differentiable function such that $g(2) =
      0$ and if $f'(x) = (x^2 - 4x + 3)g(x)$, which of the following is true?
    answer: $f$ has relative maxima at $x = 1$ and $x = 3$.
    distractors:
      - $f$ has relative minima at $x = 1$ and $x = 3$.
      - $f$ has a relative minimum at $x = 1$ and a relative maximum at $x = 3$.
      - $f$ has a relative maximum at $x = 1$ and a relative minimum at $x = 3$.
    solution: |
      \begin{gather*}
        f'(x) = (x - 1)(x - 3)g(x)
      \end{gather*}
      \sgchart{1,2,3}{f'(x): +-+-}
    sections: []
    dok: unknown

  - id: 17
    legacy_id: 5.B.2
    question: |
      What are all values of $x$ for which the function $f$ defined by
      $f(x) = x^3 + 3x^2 + 6x + 18$ is increasing?
    answer: all real numbers
    distractors:
      - $x < -3$
      - $x > -3$
      - $x < -6$ or $x > -3$
    solution: |
      \begin{gather*}
        f'(x) = 3x^2 + 6x + 6
      \end{gather*}
      Since $f'(x) > 0$ for all real numbers, $f(x)$ is increasing for all real numbers.
    sections: []
    dok: unknown

  - id: 18
    legacy_id: 5.B.3
    question: |
      If $f$ is the function defined by $f(x) = x^4 + 4x^3 + 6x^2 + 60x - 24$,
      what are all the \textit{x}-coordinates of points of inflection for the
      graph of $f$?
    answer: There are no points of inflection
    distractors:
      - 1
      - -1, 0, and 1
      - -1
    solution: |
      \begin{gather*}
        f'(x) = 4x^3 + 12x^2 + 12x + 60 \\
        f''(x) = 12x^2 + 24x + 12 = 12(x^2 + 2x + 1) = 12(x + 1)^2 \\
      \end{gather*}
    sections: []
    dok: unknown

