  - id: e51d31e1-380a-4d98-86ab-408476093611
    legacy_ids:
      - 5.B.9
    related_to:
      - 26aee9f5-33cf-410a-baf2-f3d600aedacd
    question: |
      Given $f(x) = -3 + \frac{20}{x}$, find all $c$ in the interval $(-5, -2)$ such
      that $f'(c) = \frac{f(-2) - f(-5)}{-2 - (-5)}$.
    answer: $-2 \sqrt{ \frac{5}{3} }$
    distractors:
      - $\pm 2 \sqrt{ \frac{5}{3} }$
      - $\sqrt{ \frac{5}{3} }$
      - $\pm \sqrt{ \frac{5}{3} }$
    solution: |
      \begin{gather*}
        f'(x) = -\frac{20}{x^2} \\
        f(-2) = -3 + \frac{20}{-2} = -3 - 10 = -13 \\
        f(-5) = -3 + \frac{20}{-5} = -3 - 4 = -7 \\
        -\frac{20}{c^2} = \frac{-13 - (-7)}{-2 - (-5)} \implies
        -\frac{20}{c^2} = \frac{-6}{3} \implies
        -\frac{20}{c^2} = -3 \implies
        20 = 3c^2 \implies
        c^2 = \frac{20}{3} \\
        c = -2 \sqrt{ \frac{5}{3} }
      \end{gather*}
    calculator_active: false
    sections: []
    dok: unknown

