    question: |
      A student attempted to solve the differential equation $\dydx = x + 2xy$ with
      initial condition $y = 1$ when $x = 0$. In which step does an error first
      appear?

      \begin{center}
        \begin{gather*}
          (1) \qquad \dydx = x(1 + 2y) \\
          (2) \qquad \int \frac{1}{1 + 2y} dy = \int x dx \\
          (3) \qquad \ln |1 + 2y| = \frac{x^2}{2} + C \\
          (4) \qquad y(0) = 1 \Rightarrow \ln |1 + 2(1)| = \frac{0^2}{2} + C \\
          (5) \qquad C = \ln 3 \\
          (6) \qquad \ln |1 + 2y| = \frac{x^2}{2} + \ln 3 \\
          (7) \qquad e^{\ln |1 + 2y|} = e^{\frac{x^2}{2} + \ln 3} \\
          (8) \qquad 1 + 2y = \ln 3 e^{\frac{x^2}{2}} \\
          (9) \qquad \boxed{y = \frac{\ln 3}{2}e^{\frac{x^2}{2}} + \frac{1}{2}} \\
        \end{gather*}
      \end{center}
    answer: Step 3
    distractors:
      - Step 1
      - Step 8
      - Step 9
    solution: TODO
    calculator_active: true
    sections: []
    dok: unknown
