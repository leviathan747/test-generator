      and $f(1) = \lim_{x \to 1} f(x) \quad \therefore f$ is continuous on its
      domain.

      $\lim_{x \to 1^-} x^2 + 2x - 5 = \lim_{x \to 1^+} kx^2 + 4x - 2 \quad \Rightarrow \quad 1 + 2 - 5 = k + 4 - 2$
      $\quad \Rightarrow \quad k = -4$
