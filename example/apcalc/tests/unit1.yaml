    related_to:
      - 4930c5be-3c77-4e89-bb06-1e2f67bf1bfd
    question: |
      Let $g$ and $h$ be the functions defined by $g(x) = \sin \left(\frac{\pi}{2}x\right) + 4$
      and $h(x) = -\frac{1}{4}x^3 + \frac{3}{4}x + \frac{9}{2}$. If $f$ is a
      function that satisfies $g(x) \le f(x) \le h(x)$ for $-1 < x < 2$, what is
      $\lim_{x \to 1} f(x)$?
    answer: 5
    distractors:
      - 4
      - $\frac{9}{2}$
      - The limit cannot be determined with the given information.
    solution: |
      $\lim_{x \to 1} g(x) = \sin \left(\frac{\pi}{2}(1)\right) + 4 = 5$
      \quad and \quad
      $\lim_{x \to 1} h(x) = -\frac{1}{4} + \frac{3}{4} + \frac{9}{2} = 5 \quad \therefore \lim_{x \to 1} f(x) = 5$
      \quad (Squeeze Theorem)
    calculator_active: false
    sections:
      - 1.8
    dok: 2
    review: none

  - id: 583ab789-6ea3-41ff-9c55-86a61b4f2bf6
