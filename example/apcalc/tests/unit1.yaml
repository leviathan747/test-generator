    question: |
      Find the limit: $\lim_{x \to 0} \frac{\sqrt{x + 1} - 1}{x}$
    answer: $\frac{1}{2}$
    distractors:
      - $\frac{1}{4}$
      - $\frac{1}{6}$
      - 0
    solution: |
      $\lim_{x \to 0} \frac{\sqrt{x + 1} - 1}{x} \cdot \frac{\sqrt{x + 1} + 1}{\sqrt{x + 1} + 1}$
      $= \lim_{x \to 0} \frac{(x + 1) - 1}{x(\sqrt{x + 1} + 1)}$ \\
      $= \lim_{x \to 0} \frac{\cancel{x}}{\cancel{x}(\sqrt{x + 1} + 1)}$
      $= \lim_{x \to 0} \frac{1}{\sqrt{x + 1} + 1}$
      $= \frac{1}{\sqrt{0 + 1} + 1}$
      $= \frac{1}{1 + 1}$
      $= \frac{1}{2}$
    calculator_active: false
