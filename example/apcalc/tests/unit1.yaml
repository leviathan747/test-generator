    question: |
      Find the constant $a$ that makes $f(x)$ continuous for its entire domain.
      \[
        f(x) = \begin{cases}
                x^2 - 2x + 3 & x \le 1 \\
                ax^2 + 4x - 2 & x > 1 \\
              \end{cases}
      \]
    answer: 0
    distractors:
      - 2
      - 3
      - -2
    solution: |
      If $\lim_{x \to 1^-} f(x) = \lim_{x \to 1^+} f(x)$, the limit will exist
      and $f(1) = \lim_{x \to 1} f(x) \quad \therefore f$ is continuous on its
      domain.

      $\lim_{x \to 1^-} x^2 - 2x + 3 = \lim_{x \to 1^+} ax^2 + 4x - 2 \quad \Rightarrow \quad 1 - 2 + 3 = a + 4 - 2$
      $\quad \Rightarrow \quad a = 0$
    calculator_active: false
    sections:
      - 1.11
      - 1.13
    dok: 2
    review: none

