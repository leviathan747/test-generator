    answer: $3x^2 - 7$
    distractors:
      - 0
      - -7
      - $x^3 - 7x$
    solution: |
      $\lim_{\Delta x \to 0} \frac{\cancel{x^3} + 3x^2\Delta x + 3x\Delta x^2 + \Delta x^3 - \cancel{7x} - 7\Delta x - \cancel{x^3} + \cancel{7x}}{\Delta x}$
