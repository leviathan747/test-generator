    question: |
      Given that $\lim_{x \to a} f(x) = -3$ and $\lim_{x \to a} g(x) = 9$, find
      $\lim_{x \to a} \frac{2f(x)}{g(x) + f(x)}$.
    answer: -1
    distractors:
      - 1
      - $-\frac{1}{2}$
      - $\frac{1}{2}$
    solution: |
      $\lim_{x \to a} \frac{2 f(x)}{g(x) + f(x)}$
      $= \frac{2 \lim_{x \to a} f(x)}{\lim_{x \to a} g(x) + \lim_{x \to a} f(x)}$
      $= \frac{2 (-3)}{9 + (-3)}$
      $= \frac{-6}{6} = -1$
    calculator_active: false
    sections:
      - 1.5
    dok: 2
    review: none

