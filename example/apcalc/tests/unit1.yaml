    question: |
      What are all horizontal asymptotes of the graph of
      $y = \frac{5 + 2^x}{1 - 2^x}$ in the $xy$-plane?
    answer: $y = -1$ and $y = 5$
    distractors:
      - $y = -1$ only
      - $y = 5$ only
      - $y = 0$ and $y = 5$
    solution: |
