    question: |
      Find the $x$ values for which $f(x)$ is not continuous where $f$ is given by
      \[
        f(x) = \begin{cases}
                \frac{1}{x - 3} & x \le 5 \\
                \frac{1}{2} & x > 5 \\
              \end{cases}
      \]
    answer: 3
    distractors:
      - 5
      - Both 3 and 5
      - $f(x)$ is continuous on $(-\infty, \infty)$
    solution: |
      $\lim_{x \to 5^-} f(x) = \frac{1}{5 - 3} = \frac{1}{2}$ \quad
      $\lim_{x \to 5^+} f(x) = \frac{1}{2}$ \quad $\therefore f(x)$ is continuous at $x = 5$. \\
      At $x = 3$, $f(3) = \frac{1}{3 - 3}$ is undefined, so $f(x)$ is not continuous at $x = 3$.
    calculator_active: false
    sections:
      - 1.11
      - 1.12
    dok: 2
    review: none

  - id: 574dc825-9fea-4daf-b65d-997c6cb71eff
    legacy_ids:
      - 1.A.2
    related_to:
      - 24468954-50ed-4ac6-a533-421604039f32
    question: |
      Find the limit: $\lim_{x \to -1} \frac{\sqrt{x + 5} - 2}{x + 1}$
    answer: $\frac{1}{4}$
    distractors:
      - $\frac{1}{6}$
      - $\frac{1}{2}$
      - 0
    solution: |
      $\lim_{x \to -1} \frac{\sqrt{x + 5} - 2}{x + 1} \cdot \frac{\sqrt{x + 5} + 2}{\sqrt{x + 5} + 2}$
      $= \lim_{x \to -1} \frac{(x + 5) - 4}{(x + 1)(\sqrt{x + 5} + 2)}$ \\
      $= \lim_{x \to -1} \frac{\cancel{x + 1}}{\cancel{(x + 1)}(\sqrt{x + 5} + 2)}$
      $= \lim_{x \to -1} \frac{1}{\sqrt{x + 5} + 2}$
      $= \frac{1}{\sqrt{-1 + 5} + 2}$
      $= \frac{1}{2 + 2}$
      $= \frac{1}{4}$
    calculator_active: false
    sections:
      - 1.6
      - 1.7
    dok: 2
    review: none

