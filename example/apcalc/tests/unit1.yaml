    question: |
      Let $f$ be a function such that $f(x) = \frac{g(x)}{h(x)}$, where $g$ and
      $h$ are continuous for all real numbers. Which one of the following
      statements must be true?
    answer: If $\lim_{x \to c} f(x) = \infty$, then $x = c$ must be a vertical asymptote.
    distractors:
      - $f$ must be a continuous function.
      - If $g(c) = 0$ and $h(c) = 0$, then $\lim_{x \to c} f(x)$ does not exist.
      - If $h(c) = 0$, then $x = c$ must be a vertical asymptote.
    solution: |
      A: $f$ is not continuous when $h(x) = 0$ \quad B/C: counter example: $g(x) = x - c$, $h(x) = x - c \Rightarrow \lim_{x \to c} f(x) = 1$ \\
      D: Restatement of definition of vertical asymptote
    calculator_active: false
