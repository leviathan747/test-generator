    question: |
      Suppose the line $y = 2$ is a horizontal asymptote of the graph of $f$.
      Which of the following statements must be true?
    answer: $\lim_{x \to \infty} f(x) = 2$ or $\lim_{x \to -\infty} f(x) = 2$
    distractors:
