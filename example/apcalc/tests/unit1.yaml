      to $g(2)$ to remove the discontinuity at $x = 2$?
    answer: $\frac{3}{2}$
    distractors:
      - 0
      - 2
      - The discontinuity at $x = 2$ cannot be removed.
    solution: |
      $g(x) = \frac{(x + 4)\cancel{(x - 2)}}{\cancel{(x - 2)}(x + 2)}
      = \frac{x + 4}{x + 2}$ for $x \ne 2$, so
      $\lim_{x \to 2} g(x) = \frac{6}{4} = \frac{3}{2}$. Defining
      $g(2) = \frac{3}{2}$ removes the discontinuity. (The discontinuity at
      $x = -2$ is a vertical asymptote and cannot be removed.)
