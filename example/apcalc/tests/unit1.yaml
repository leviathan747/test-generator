    question: |
      Suppose that $y = f(x)$ is a continuous function defined for all real
      numbers $x$ and $f(-6) = 5$ and $f(-2) = -1$. If $f(c) = 0$ for one and
      only one value of $c$, then which of the following could be $c$?
    answer: -3
    distractors:
      - -6
      - -2
      - 0
    solution: |
      Because $f$ is continuous and $f(-6) > 0 > f(-2)$, Intermediate Value
      Theorem guarantees that there will be some $c$ such that $f(c) = 0$ and
      $-6 < c < -2$. Since there is only one such value on the domain of $f$,
      it must occur between -6 and -2.
    calculator_active: false
    sections:
      - 1.16
    dok: 3
    review: none

