    answer: $\frac{3}{\sqrt 2}$
    distractors:
      - $\infty$
      - 0
      - $-\frac{3}{\sqrt 2}$
    solution: |
      $\lim_{x \to \infty} \frac{3x - 2}{\sqrt{2x^2 + 1}} \cdot \frac{\frac{1}{x}}{\frac{1}{x}}$
      $= \lim_{x \to \infty} \frac{3 - \frac{2}{x}}{\sqrt{\frac{2x^2 + 1}{x^2}}}$
      $= \lim_{x \to \infty} \frac{3 - \frac{2}{x}}{\sqrt{2 + \frac{1}{x^2}}}$
      $= \frac{3 - 0}{\sqrt{2 + 0}} = \frac{3}{\sqrt{2}}$
