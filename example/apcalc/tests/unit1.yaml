    question: |
      Find the limit: $\lim_{h \to 0} \frac{(x + h)^2 + 3(x + h) + 4 - (x^2 + 3x + 4)}{h}$
    answer: $2x + 3$
    distractors:
      - $\frac{1}{3}x^3 + \frac{3}{2}x^2 + 4x$
      - $2x - 2$
      - $x^2 + 3x + 4$
    solution: |
      $\lim_{h \to 0} \frac{\cancel{x^2} + 2xh + h^2 + \cancel{3x} + 3h + \cancel{4} - \cancel{x^2} - \cancel{3x} - \cancel{4}}{h}$
      $= \lim_{h \to 0} \frac{2xh + h^2 + 3h}{h}$
      $= \lim_{h \to 0} \frac{\cancel{h}(2x + h + 3)}{\cancel{h}}$
      $= 2x + 0 + 3 = 2x + 3$
    calculator_active: true
    sections:
      - 1.6
      - 1.7
    dok: 2
    review: none

