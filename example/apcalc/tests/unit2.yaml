    question: |
      The function $f$ is defined by $f(x) = \frac{x}{x + 2}$. What points $(x,
      y)$ on the graph of $f$ have the property that the line tangent to $f$ at
      $(x, y)$ has slope $\frac{1}{2}$?
    answer: $(0, 0)$ and $(-4, 2)$
    distractors:
      - $\left(\frac{1}{2}, \frac{1}{5}\right)$ only
      - $(0, 0)$ only
      - $(0, 0)$ and $\left(4, \frac{2}{3}\right)$
    solution: |
      $f'(x) = \frac{(x + 2) \cdot 1 - x \cdot 1}{(x + 2)^2}$
      $= \frac{2}{(x + 2)^2}$

      $f'(x) = \frac{1}{2} \implies \frac{2}{(x + 2)^2} = \frac{1}{2} \implies$
      $4 = (x + 2)^2 \implies 4 = x^2 + 4x + 4 \implies x^2 + 4x = 0 \implies$
      $x(x + 4) = 0$

      $x = 0, -4$
