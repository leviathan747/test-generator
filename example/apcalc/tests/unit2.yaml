  - id: d4890992-36a2-4016-9da9-78ebb563b351
    legacy_ids:
      - 2.A.7
    question: Find $f'(t)$ if $f(t) = \frac{\ln t}{t^2}$
    answer: $f'(t) = \frac{1 - 2 \ln t}{t^3}$
    distractors:
      - $f'(t) = \frac{\frac{1}{t}}{2t}$
      - $f'(t) = t - 2t \ln t$
      - $f'(t) = \frac{t + 2t \ln t}{t^2}$
    solution: |
      $f'(t) = \frac{t^2 \cdot \frac{1}{t} - \ln t \cdot 2t}{t^4}$
      $= \frac{t(1 - 2 \ln t)}{t^4}$
      $= \frac{1 - 2 \ln t}{t^3}$ \quad (Quotient Rule)
    calculator_active: false
