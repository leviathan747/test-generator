  - id: e7b7ef4b-8357-4ff2-929b-a5dd92d502b6
    legacy_ids:
      - 2.A.15
    related_to:
      - 753fbcbc-9488-4009-a925-3c36bb226d50
    question: |
      At $x = 2$, the function given by $f(x) = \begin{cases}
        x^2 + 1 & x \le 2 \\
        4x - 3 & x > 2 \\
      \end{cases}$ is
    answer: both continuous and differentiable
    distractors:
      - differentiable, but not continuous
      - continuous, but not differentiable
      - neither continuous nor differentiable
    solution: |
      $\lim_{x \to 2^-} f(x) = \lim_{x \to 2^-} x^2 + 1 = (2)^2 + 1 = 5$ \quad
      $\lim_{x \to 2^+} f(x) = \lim_{x \to 2^+} 4x - 3 = 4(2) - 3 = 5$ \quad
      $\therefore f(x)$ is continuous at $x = 2$

      $f'(2) = \lim_{x \to 2} \frac{f(x) - f(2)}{x - 2}$

      $\lim_{x \to 2^-} \frac{f(x) - f(2)}{x - 2}$
      $= \lim_{x \to 2^-} \frac{x^2 + 1 - \left[(2)^2 + 1\right]}{x - 2}$
      $= \lim_{x \to 2^-} \frac{x^2 - 4}{x - 2}$
      $= \lim_{x \to 2^-} \frac{(x - 2)(x + 2)}{x - 2}$
      $= \lim_{x \to 2^-} x + 2 = 2 + 2 = 4$

      $\lim_{x \to 2^+} \frac{f(x) - f(2)}{x - 2}$
      $= \lim_{x \to 2^+} \frac{4x - 3 - \left[4(2) - 3\right]}{x - 2}$
      $= \lim_{x \to 2^+} \frac{4x - 8}{x - 2}$
      $= \lim_{x \to 2^+} \frac{4(x - 2)}{x - 2}$
      $= \lim_{x \to 2^+} 4 = 4$

      $\therefore f'(2) = 4$
    calculator_active: true
    sections:
      - 2.2
      - 2.4
    dok: unknown
    review: none

