    related_to:
      - a0cc1729-ebce-4f25-9234-340ec5787a00
    question: |
      If $f(x) = 3x \cos(x)$, then what is the slope of the tangent line to the
      graph of $f(x)$ when $x = \frac{\pi}{2}$?
    answer: $-\frac{3\pi}{2}$
    distractors:
      - 3
      - $\frac{3\pi}{2}$
      - -3
    solution: |
      $f'(x) = 3x \cdot -\sin(x) + 3 \cdot \cos(x)$ \qquad (Product Rule)

      $f'\left(\frac{\pi}{2}\right) = 3 \left(\frac{\pi}{2}\right) \cdot -\sin\left(\frac{\pi}{2}\right)$
      $+ 3 \cdot \cos\left(\frac{\pi}{2}\right)$
      $= \frac{3\pi}{2} \cdot -1 + 3 \cdot 0 = -\frac{3\pi}{2}$
    calculator_active: false
    sections: []
    dok: unknown
    review: none

