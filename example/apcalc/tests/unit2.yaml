    question: |
      If $f(x) = 2x \sin x$, then what is the slope of the tangent line to the
      graph of $f(x)$ when $x = \frac{\pi}{2}$?
    answer: 2
    distractors:
      - $\frac{1}{2}$
      - 0
      - $\pi$
    solution: |
      $f'(x) = 2x \cos x + 2 \sin x$ \quad (Product Rule)

      $f'\left(\frac{\pi}{2}\right) = 2\left(\frac{\pi}{2}\right) \cos \frac{\pi}{2} + 2 \sin \frac{\pi}{2}$
      $= 2\left(\frac{\pi}{2}\right)(0) + 2(1) = 2$
