      A counter records people entering a fast food restaurant. The data below
      shows the number of customers, $N(t)$ that are in the restaurant every
      two hours starting at 8:00 am. Estimate the rate at which the customers
      are entering the restaurant at 1:00 pm ($t = 5$).

      \fullwidth{\begin{center}
        \begin{tabularx}{4in}{ |*{8}{Y|} }
          \hline
          \bm{$t$} & 0 & 2 & 4 & 6 & 8 & 10 & 12 \\
          \hline
          \bm{$N(t)$} & 0 & 21 & 42 & 36 & 14 & 58 & 23 \\
          \hline
        \end{tabularx}
      \end{center}}
    answer: -3 customers/hr
    distractors:
      - 6 customers/hr
      - 39 customers/hr
      - -6 customers/hr
    solution: |
      $N'(5) \approx \frac{36 - 42}{6 - 4} = -3$

      \emph{Note: the negative value for the rate indicates that customers are
      leaving the store during this period}
