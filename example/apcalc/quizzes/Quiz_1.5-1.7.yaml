  - id: 1245a6ac-cbf1-4aa5-8303-8d4fc8d093f9
    question: |
      Use the graph of $y = f(x)$ to find $\lim_{x \to 0} f(1 - x^2)$.
    figure: 26.tex
    answer: 3
    distractors:
      - 1
      - 2
      - 4
      - does not exist
    solution: |
      $\lim_{x \to 0} (1 - x^2) = 1 \Rightarrow \lim_{x \to 1^-} f(x) = 3$

      Since $x = 0$ is the location of the maximum of a downward facing
      parabola, as $x \to 0$, $y \to 1$ from below, so when we evaluate the
      outer limit, we let $x \to 1$ from the left.
    calculator_active: false
