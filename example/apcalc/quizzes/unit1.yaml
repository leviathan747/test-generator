  - id: 6f64339e-f0bc-4db4-afc9-3436705724ae
    question: |
      The graph below represents the function $y = \cos
      \left(\frac{1}{x}\right)$. Evaluate $\lim_{x \to 0} \cos
      \left(\frac{1}{x}\right)$.
      \fullwidth{\begin{center}
        \input{images/28.tex}
      \end{center}}
    answer: does not exist
    distractors:
      - 0
      - 1
      - -1
    solution: |
      As $x \to 0$, $\frac{1}{x} \to \pm\infty$, so $\cos
      \left(\frac{1}{x}\right)$ oscillates between $-1$ and $1$ infinitely
      often near $x = 0$, as seen in the graph. Since the function does not
      approach a single value, the limit does not exist.
    calculator_active: false
    sections:
      - 1.3
    dok: -1
    question_type: MCQ
    assessment_type: quiz
    review: none

  - id: 9e006e95-98b1-4296-91db-1f3e6ad7c320
    question: Which of the following is true about the limit $\lim_{x \to 0} \frac{x}{|x|}$?
    answer: The limit does not exist because $f(x)$ approaches two different numbers from the left and right.
    distractors:
      - The $\lim_{x \to 0} \frac{x}{|x|} = 0$.
      - The $\lim_{x \to 0} \frac{x}{|x|} = 1$.
      - The limit does not exist because the graph of $f(x)$ features a vertical asymptote at $x = 0$.
    solution: |
      For $x > 0$, $|x| = x$, so $\frac{x}{|x|} = 1$ and
      $\lim_{x \to 0^+} \frac{x}{|x|} = 1$.

      For $x < 0$, $|x| = -x$, so $\frac{x}{|x|} = -1$ and
      $\lim_{x \to 0^-} \frac{x}{|x|} = -1$.

      Since the one-sided limits are different, the limit does not exist.
      There is no vertical asymptote; the function values stay bounded at
      $\pm 1$ near $x = 0$.
    calculator_active: false
    sections:
      - 1.3
    dok: -1
    question_type: MCQ
    assessment_type: quiz
    review: none

  - id: 1245a6ac-cbf1-4aa5-8303-8d4fc8d093f9
    question: |
      Find $\lim_{x \to 0} f(1 - x^2)$
      \fullwidth{\begin{center}
        \input{images/26.tex}
      \end{center}}
    answer: 3
    distractors:
      - 1
      - 2
      - 4
      - does not exist
    solution: |
      $\lim_{x \to 0} (1 - x^2) = 1 \Rightarrow \lim_{x \to 1^-} f(x) = 3$

      Since $x = 0$ is the location of the maximum of a downward facing
      parabola, as $x \to 0$, $y \to 1$ from below, so when we evaluate the
      outer limit, we $x \to 1$ from the left.
    calculator_active: false
    sections:
      - 1.3
      - 1.7
    dok: -1
    question_type: MCQ
    assessment_type: quiz
    review: none

  - id: 81cceaba-8719-477a-b0ec-d435f36694dd
    question: Find $\lim_{x \to 2} \left( \frac{1}{x - 2} + \frac{1}{x^2 - 5x + 6} \right)$. Show all your steps.
    solution: |
      \begin{gather*}
        \lim_{x \to 2} \left( \frac{1}{x - 2} + \frac{1}{(x - 2)(x - 3)} \right) \\
        \lim_{x \to 2} \left( \frac{x - 3}{(x - 2)(x - 3)} + \frac{1}{(x - 2)(x - 3)} \right) \\
        \lim_{x \to 2} \frac{\cancel{x - 2}}{\cancel{(x - 2)}(x - 3)} \\
        \lim_{x \to 2} \frac{1}{x - 3} = \frac{1}{2 - 3}= \frac{1}{-1} = \boxed{-1} \\
      \end{gather*}
    calculator_active: false
    sections:
      - 1.5
      - 1.6
      - 1.7
    dok: -1
    question_type: FRQ
    assessment_type: quiz
    size: 2in
    review: none

  - id: 402e0ee8-c10d-4630-8dd6-7c180f3558d3
    question: If $\lim_{x \to 0} \frac{\sin x}{x} = 1$, find the value of $\lim_{x \to 0} \frac{2 \tan x}{x}$. Show all your steps.
    solution: |
      \begin{gather*}
        \lim_{x \to 0} \frac{\sin x}{x} \cdot \frac{2}{\cos x} \\
        \lim_{x \to 0} \frac{\sin x}{x} \cdot \lim_{x \to 0} \frac{2}{\cos x} \\
        1 \cdot \frac{2}{\cos 0} = \frac{2}{1} = \boxed{2} \\
      \end{gather*}
    calculator_active: false
