    question: If $e^{xy} - y^3 = e - 8$, then at $x = \frac{1}{2}$ and $y = 2$, $\dydx =$
    answer: $\frac{4e}{24 - e}$
    distractors:
      - $\frac{4e}{12 - e}$
      - $\frac{e}{8}$
      - $\frac{e}{4}$
    solution: |
      \begin{gather*}
        e^{xy} \cdot \left( x \dydx + y \right) - 3y^2 \dydx = 0 - 0 \\
        \dydx \left(xe^{xy}  - 3y^2 \right) + ye^{xy} = 0 \\
        \dydx = \frac{-ye^{xy}}{xe^{xy}  - 3y^2} \\
        \dydx \Big|_{x = \frac{1}{2}, y = 2} = \frac{-(2)e^{\frac{1}{2} \cdot 2}}{\frac{1}{2}e^{\frac{1}{2} \cdot 2}  - 3(2)^2} \\
        = \frac{-2e}{\frac{1}{2}e  - 12} \cdot \frac{-2}{-2} \\
        = \frac{4e}{24 - e} \\
      \end{gather*}
    calculator_active: true
    sections:
      - 3.1
      - 3.2
    dok: unknown

