    question: |
      Given $h(x) = g(f(x))$, use the graph below to find $h'(4)$.

      \fullwidth{\begin{center}
        \input{images/6.tex}
      \end{center}}
    answer: $\frac{5}{8}$
    distractors:
      - $\frac{1}{2}$
      - 0
      - $\frac{5}{4}$
    solution: |
      $h'(4) = g'(f(4)) \cdot f'(4)$ \\
      $f(4) = \frac{5}{2} \quad f'(4) = \frac{5}{4} \quad g'\left(\frac{5}{2}\right) = \frac{1}{2}$ \\
      $h'(4) = \frac{1}{2} \cdot \frac{5}{4} = \frac{5}{8}$ \\
      Note: the values of $f'$ and $g'$ are found by determining the slope of the graph at the given $x$ value.
    calculator_active: false
