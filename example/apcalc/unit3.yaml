    question: Find $(f^{-1})'(3)$ for the function $f(x) = x^3 + 4x - 13$.
    answer: $\frac{1}{16}$
    distractors:
      - 365
      - $\frac{1}{5}$
      - 16
    solution: |
      $(f^{-1})'(3) = \frac{1}{f'(f^{-1}(3))}$ \\
      $f'(x) = 3x^2 + 4$ \\
      $3 = x^3 + 4x - 13$ \quad (Solve for $x$ when $f(x) = 3$ to find $f^{-1}(3)$) \\
      $x = 2$ \\
      $(f^{-1})'(3) = \frac{1}{f'(2)}$
      $= \frac{1}{3(2)^2 + 4} = \frac{1}{16}$
    calculator_active: true
