    question: Given $f(x) = \ln \left( \sin^{-1}(2x) \right)$, find $f'(x)$.
    answer: $\frac{2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
    distractors:
      - $\frac{-2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
      - $\frac{2}{(1 - x^2)\sin^{-1}(2x)}$
      - $\frac{1}{(1 - x^2)\sin^{-1}(2x)}$
    solution: |
      $f'(x) = \frac{1}{\sin^{-1}(2x)} \cdot \frac{1}{\sqrt{1 - (2x)^2}} \cdot 2$
      $= \frac{2}{\sqrt{1 - 4x^2}\sin^{-1}(2x)}$
      \qquad (Chain Rule)
