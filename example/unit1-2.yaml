    answer: $-\frac{5}{7}$
    distractors:
      - $\frac{5}{7}$
      - The limit does not exist.
      - 0
    solution: |
      $\lim_{x \to b} \frac{g(x)}{f(x) - g(x)}$
      $= \frac{\lim_{x \to b} g(x)}{\lim_{x \to b} f(x) - \lim_{x \to b} g(x)}$
      $= \frac{-5}{2 - (-5)}$
      $= -\frac{5}{7}$
    sections:
      - 1.5
    dok: unknown

  - id: 20
    legacy_id: 1.B.5
    question: |
      Find the limit: $\lim_{x \to 0} \frac{\sqrt{x + 1} - 1}{x}$
    answer: $\frac{1}{2}$
    distractors:
      - $\frac{1}{4}$
      - $\frac{1}{6}$
      - 0
    solution: |
      $\lim_{x \to 0} \frac{\sqrt{x + 1} - 1}{x} \cdot \frac{\sqrt{x + 1} + 1}{\sqrt{x + 1} + 1}$
      $= \lim_{x \to 0} \frac{(x + 1) - 1}{x(\sqrt{x + 1} + 1)}$ \\
      $= \lim_{x \to 0} \frac{\cancel{x}}{\cancel{x}(\sqrt{x + 1} + 1)}$
      $= \lim_{x \to 0} \frac{1}{\sqrt{x + 1} + 1}$
      $= \frac{1}{\sqrt{0 + 1} + 1}$
      $= \frac{1}{1 + 1}$
      $= \frac{1}{2}$
    sections:
      - 1.6
      - 1.7
    dok: unknown

  - id: 21
