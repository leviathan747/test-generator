    question: |
      \fullwidth{
        \begin{center}
          \includegraphics{12-1}
          \hspace{3em}
          \includegraphics{12-2}
        \end{center}
      }

      The graphs of the function $f$ and $g$ are shown in the figures above.
      Which of the following statements is true?
    answer: $\lim_{x \to 2} (f(x - 1) \cdot g(x))$ exists.
    distractors:
      - $\lim_{x \to 2} f(x)$ does not exist.
      - $\lim_{x \to 2} (f(x) \cdot g(x - 1))$ does not exist.
      - $\lim_{x \to 1^-} g(x) = -1$.
    solution: |
      A: $\lim_{x \to 2} f(x) = 0 \Rightarrow$ false \\
      B: $\lim_{x \to 2} f(x -1) = 0$, $lim_{x \to 2} g(x) = -1 \implies \lim_{x \to 2} (f(x - 1) \cdot g(x)) = 0 \Rightarrow$ true \\
      C: $\lim_{x \to 2^-} (f(x) \cdot g(x - 1)) = 0 \cdot 1 = 0$
      $\quad \lim_{x \to 2^+} (f(x) \cdot g(x - 1)) = 0 \cdot -1 = 0$
      $\quad \therefore \quad \lim_{x \to 2} (f(x) \cdot g(x - 1)) = 0 \Rightarrow$ false \\
      D: $\lim_{x \to 1^-} g(x) = 1 \Rightarrow$ false
    sections:
      - 1.3
      - 1.5
    dok: unknown
