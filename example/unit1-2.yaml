        f(x) = \begin{cases}
                x^2 + 2x - 5 & x \le 1 \\
                kx^2 + 4x - 2 & x > 1 \\
              \end{cases}
      \]
    answer: -4
    distractors:
      - 0
      - 4
      - 2
    solution: |
      If $\lim_{x \to 1^-} f(x) = \lim_{x \to 1^+} f(x)$, the limit will exist
      and $f(1) = \lim_{x \to 1} f(x) \quad \therefore f$ is continuous on its
      domain.

      $\lim_{x \to 1^-} x^2 + 2x - 5 = \lim_{x \to 1^+} kx^2 + 4x - 2 \quad \Rightarrow \quad 1 + 2 - 5 = k + 4 - 2$
      $\quad \Rightarrow \quad k = -4$
    sections:
      - 1.11
      - 1.12
    dok: unknown

