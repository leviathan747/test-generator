  - id: 5
    legacy_id: 1.A.5
    question: |
      Given that $\lim_{x \to a} f(x) = -3$ and $\lim_{x \to a} g(x) = 9$, find
      $\lim_{x \to a} \frac{2f(x)}{g(x) + f(x)}$.
    answer: -1
    distractors:
      - 1
      - $-\frac{1}{2}$
      - $\frac{1}{2}$
    solution: |
      $\lim_{x \to a} \frac{2 f(x)}{g(x) + f(x)}$
      $= \frac{2 \lim_{x \to a} f(x)}{\lim_{x \to a} g(x) + \lim_{x \to a} f(x)}$
      $= \frac{2 (-3)}{9 + (-3)}$
      $= \frac{-6}{6} = -1$
    sections:
      - 1.5
    dok: unknown

  - id: 6
    legacy_id: 1.A.6
    question: |
      Let $f$ be a function such that $f(x) = \frac{g(x)}{h(x)}$, where $g$ and
      $h$ are continuous for all real numbers. Which one of the following
      statements must be true?
    answer: If $\lim_{x \to c} f(x) = \infty$, then $x = c$ must be a vertical asymptote.
    distractors:
      - $f$ must be a continuous function.
      - If $g(c) = 0$ and $h(c) = 0$, then $\lim_{x \to c} f(x)$ does not exist.
      - If $h(c) = 0$, then $x = c$ must be a vertical asymptote.
    solution: |
      A: $f$ is not continuous when $h(x) = 0$ \quad B/C: counter example: $g(x) = x - c$, $h(x) = x - c \Rightarrow \lim_{x \to c} f(x) = 1$ \\
      D: Restatement of definition of vertical asymptote
    sections:
      - 1.11
      - 1.14
    dok: unknown

  - id: 7
    legacy_id: 1.A.7
    question: |
      Let $g$ and $h$ be the functions defined by $g(x) = \sin \left(\frac{\pi}{2}x\right) + 4$
      and $h(x) = -\frac{1}{4}x^3 + \frac{3}{4}x + \frac{9}{2}$. If $f$ is a
      function that satisfies $g(x) \le f(x) \le h(x)$ for $-1 < x < 2$, what is
      $\lim_{x \to 1} f(x)$?
    answer: 5
    distractors:
      - 4
      - $\frac{9}{2}$
      - The limit cannot be determined with the given information.
    solution: |
      $\lim_{x \to 1} g(x) = \sin \left(\frac{\pi}{2}(1)\right) + 4 = 5$
      \quad and \quad
      $\lim_{x \to 1} h(x) = -\frac{1}{4} + \frac{3}{4} + \frac{9}{2} = 5 \quad \therefore \lim_{x \to 1} f(x) = 5$
      \quad (Squeeze Theorem)
    sections:
      - 1.8
    dok: unknown

  - id: 8
    legacy_id: 1.A.8
    question: |
      Suppose that $y = f(x)$ is a continuous function defined for all real
      numbers $x$ and $f(-6) = 5$ and $f(-2) = -1$. If $f(c) = 0$ for one and
      only one value of $c$, then which of the following could be $c$?
    answer: -3
    distractors:
      - -6
      - -2
      - 0
    solution: |
      Because $f$ is continuous and $f(-6) > 0 > f(-2)$, Intermediate Value
      Theorem guarantees that there will be some $c$ such that $f(c) = 0$ and
      $-6 < c < -2$. Since there is only one such value on the domain of $f$,
      it must occur between -6 and -2.
    sections:
      - 1.16
    dok: unknown

  - id: 9
    legacy_id: 1.A.9
    question: |
      Find the constant $a$ that makes $f(x)$ continuous for its entire domain.
      \[
        f(x) = \begin{cases}
                x^2 - 2x + 3 & x \le 1 \\
                ax^2 + 4x - 2 & x > 1 \\
              \end{cases}
      \]
    answer: 0
    distractors:
      - 2
      - 3
      - -2
    solution: |
      If $\lim_{x \to 1^-} f(x) = \lim_{x \to 1^+} f(x)$, the limit will exist
      and $f(1) = \lim_{x \to 1} f(x) \quad \therefore f$ is continuous on its
      domain.

      $\lim_{x \to 1^-} x^2 - 2x + 3 = \lim_{x \to 1^+} ax^2 + 4x - 2 \quad \Rightarrow \quad 1 - 2 + 3 = a + 4 - 2$
      $\quad \Rightarrow \quad a = 0$
    sections:
      - 1.11
      - 1.12
    dok: unknown

