      The graphs of the function $f$ and $g$ are shown in the figures above.
      Which of the following statements is false?
    answer: $\lim_{x \to 2} (f(x) \cdot g(x - 1))$ does not exist.
    distractors:
      - $\lim_{x \to 2} f(x) = 0$
      - $\lim_{x \to 1} g(x)$ does not exist.
      - $\lim_{x \to 2} (f(x - 1) \cdot g(x))$ exists.
    solution: |
      $\lim_{x \to 2^-} (f(x) \cdot g(x - 1)) = 0 \cdot 1 = 0$
      $\quad \lim_{x \to 2^+} (f(x) \cdot g(x - 1)) = 0 \cdot -1 = 0$
      $\quad \therefore \quad \lim_{x \to 2} (f(x) \cdot g(x - 1)) = 0$
    sections:
