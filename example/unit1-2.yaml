    question: |
      Find the limit: $\lim_{\Delta x \to 0} \frac{(x + \Delta x)^3 - 7(x + \Delta x) - (x^3 - 7x)}{\Delta x}$
    answer: $3x^2 - 7$
    distractors:
      - 0
      - -7
      - $x^3 - 7x$
    solution: |
      $\lim_{\Delta x \to 0} \frac{\cancel{x^3} + 3x^2\Delta x + 3x\Delta x^2 + \Delta x^3 - \cancel{7x} - 7\Delta x - \cancel{x^3} + \cancel{7x}}{\Delta x}$
      $= \lim_{\Delta x \to 0} \frac{3x^2\Delta x + 3x\Delta x^2 + \Delta x^3 - 7\Delta x}{\Delta x}$ \\
      $= \lim_{\Delta x \to 0} \frac{\cancel{\Delta x}(3x^2 + 3x\Delta x + \Delta x^2 - 7)}{\cancel{\Delta x}}$
      $= \lim_{\Delta x \to 0} 3x^2 + 3x\Delta x + \Delta x^2 - 7$
      $= 3x^2 + 3x(0) + (0)^2 - 7$
      $= 3x^2 + - 7$
    sections:
      - 1.6
